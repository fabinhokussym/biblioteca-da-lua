<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Biblioteca da Lua">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#fdf6ee">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>A Páscoa da Lua — Biblioteca da Lua</title>
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

html, body {
  width:100%; height:100%;
  overflow:hidden;
  font-family: Georgia, serif;
  user-select:none; -webkit-user-select:none;
  touch-action:none;
  background: #f5ece0;
}

#topbar {
  position:fixed; top:0; left:0; right:0; z-index:50;
  display:flex; align-items:center; justify-content:center;
  padding:11px 0 0; pointer-events:none;
}
#topbar h1 {
  font-size:11px; font-weight:normal; letter-spacing:2.5px;
  color:#a06830; text-transform:uppercase; opacity:0.55;
}

#stage {
  position:fixed; inset:0; z-index:10;
  display:flex; align-items:center; justify-content:center;
}

#book-wrapper {
  position:relative; flex-shrink:0;
}
#book-wrapper::after {
  content:'';
  position:absolute;
  bottom:-12px; left:5%; right:5%; height:14px;
  background: radial-gradient(ellipse at 50% 0%, rgba(90,50,10,0.13) 0%, transparent 70%);
  pointer-events:none;
}

#book-container {
  position:relative; overflow:hidden;
  border-radius:2px 6px 6px 2px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.07), 0 8px 36px rgba(100,60,10,0.15);
}

.page { overflow:hidden; background:#f8f0e0; }
.page img {
  width:100%; height:100%;
  object-fit:cover; display:block; pointer-events:none;
}

/* Botões */
.nav-btn {
  position:fixed; top:50%; transform:translateY(-50%);
  width:42px; height:42px; border-radius:50%;
  background:rgba(255,255,255,0.9);
  border:1px solid rgba(160,100,40,0.2);
  display:flex; align-items:center; justify-content:center;
  font-size:24px; color:#b07030; cursor:pointer; z-index:60;
  box-shadow:0 2px 12px rgba(120,70,10,0.12);
  transition:opacity 0.2s, transform 0.15s;
  line-height:1;
}
.nav-btn:hover { transform:translateY(-50%) scale(1.08); }
.nav-btn:active { transform:translateY(-50%) scale(0.93); }
.nav-btn.off { opacity:0 !important; pointer-events:none; }
#btnPrev { left:10px; }
#btnNext { right:10px; }

/* Controles */
#controls {
  position:fixed; bottom:0; left:0; right:0; z-index:60;
  display:flex; align-items:center; justify-content:center;
  gap:16px; padding:8px 20px 12px;
}
#dots { display:flex; gap:6px; align-items:center; flex-wrap:wrap; justify-content:center; }
.dot {
  width:6px; height:6px; border-radius:50%;
  background:rgba(150,90,30,0.2); cursor:pointer;
  border:1px solid rgba(150,90,30,0.12); transition:all 0.2s;
}
.dot.on { background:#d4884a; transform:scale(1.4); border-color:#d4884a; }
#counter { font-size:10px; color:#a07040; letter-spacing:1.5px; opacity:0.6; min-width:42px; text-align:center; }

/* Logo */
#logo {
  position:fixed; bottom:12px; left:12px; z-index:60;
  display:flex; align-items:center; gap:4px; opacity:0.42; pointer-events:none;
}
#logo-moon { font-size:13px; line-height:1; }
#logo-text { font-size:8px; letter-spacing:1.3px; color:#a06830; text-transform:uppercase; line-height:1.3; }

/* Hint */
#hint {
  position:fixed; bottom:42px; left:50%; transform:translateX(-50%);
  background:rgba(255,255,255,0.92); color:#a06830;
  font-size:10px; padding:4px 12px; border-radius:20px;
  border:1px solid rgba(160,100,40,0.14);
  z-index:60; pointer-events:none; white-space:nowrap;
  transition:opacity 1.5s;
}
#hint.out { opacity:0; }

/* Loader */
#loader {
  position:fixed; inset:0; z-index:999;
  background:#fdf6ee;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:16px;
  transition:opacity 0.9s;
}
#loader.out { opacity:0; pointer-events:none; }
.moon-anim { font-size:50px; animation:float 2s ease-in-out infinite; }
@keyframes float {
  0%,100%{ transform:translateY(0) rotate(-8deg); }
  50%{ transform:translateY(-10px) rotate(8deg); }
}
#loader-title { font-size:17px; color:#c07838; letter-spacing:2.5px; font-style:italic; opacity:0.85; }
#loader-sub { font-size:10px; color:#c09060; letter-spacing:2px; opacity:0.5; }
</style>
</head>
<body>

<div id="loader">
  <div class="moon-anim">🌙</div>
  <p id="loader-title">Biblioteca da Lua</p>
  <p id="loader-sub">Abrindo o livro...</p>
</div>

<div id="topbar"><h1>A Páscoa da Lua</h1></div>

<div id="stage">
  <div id="book-wrapper">
    <div id="book-container"></div>
  </div>
</div>

<button class="nav-btn off" id="btnPrev">&#8249;</button>
<button class="nav-btn" id="btnNext">&#8250;</button>

<div id="hint">👆 clique nas laterais para virar a página</div>
<div id="controls">
  <span id="counter">1 / 12</span>
  <div id="dots"></div>
</div>
<div id="logo">
  <span id="logo-moon">🌙</span>
  <span id="logo-text">Biblioteca<br>da Lua</span>
</div>

<script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.js"></script>
<script>
// v5
const SRCS = [
  'pascoa-da-lua/00_L.jpg','pascoa-da-lua/00_R.jpg',
  'pascoa-da-lua/01_L.jpg','pascoa-da-lua/01_R.jpg',
  'pascoa-da-lua/02_L.jpg','pascoa-da-lua/02_R.jpg',
  'pascoa-da-lua/03_L.jpg','pascoa-da-lua/03_R.jpg',
  'pascoa-da-lua/04_L.jpg','pascoa-da-lua/04_R.jpg',
  'pascoa-da-lua/05_L.jpg','pascoa-da-lua/05_R.jpg',
  'pascoa-da-lua/06_L.jpg','pascoa-da-lua/06_R.jpg',
  'pascoa-da-lua/07_L.jpg','pascoa-da-lua/07_R.jpg',
  'pascoa-da-lua/08_L.jpg','pascoa-da-lua/08_R.jpg',
  'pascoa-da-lua/09_L.jpg','pascoa-da-lua/09_R.jpg',
  'pascoa-da-lua/10_L.jpg','pascoa-da-lua/10_R.jpg',
  'pascoa-da-lua/11_L.jpg','pascoa-da-lua/11_R.jpg',
];
const TOTAL = 12; // spreads

let pf        = null;
let curSpread = 0;
let hintOn    = true;
let didInit   = false;

const wrapper   = document.getElementById('book-wrapper');
const container = document.getElementById('book-container');
const dotsEl    = document.getElementById('dots');
const counterEl = document.getElementById('counter');
const btnPrev   = document.getElementById('btnPrev');
const btnNext   = document.getElementById('btnNext');
const hintEl    = document.getElementById('hint');

// Dots
for (let i=0; i<TOTAL; i++) {
  const d = document.createElement('div');
  d.className = 'dot'+(i===0?' on':'');
  d.onclick = () => { if(pf) pf.flip(i*2); };
  dotsEl.appendChild(d);
}

function updateUI(idx) {
  curSpread = Math.floor(idx/2);
  counterEl.textContent = `${curSpread+1} / ${TOTAL}`;
  dotsEl.querySelectorAll('.dot').forEach((d,i)=>d.classList.toggle('on',i===curSpread));
  btnPrev.classList.toggle('off', curSpread===0);
  btnNext.classList.toggle('off', curSpread===TOTAL-1);
}

// ══════════════════════════════════════
// CÁLCULO DE TAMANHO
// Usa screen.width/height quando disponível
// para evitar bugs de orientação no iOS
// ══════════════════════════════════════
function calcSize() {
  // Usa visualViewport se disponível (mais preciso em mobile)
  const vp = window.visualViewport;
  const vw = vp ? vp.width  : window.innerWidth;
  const vh = vp ? vp.height : window.innerHeight;

  // Espaço disponível descontando controles
  const usedV = 52; // controles inferiores + topbar
  const availW = vw;
  const availH = Math.max(vh - usedV, 100);

  // Proporção 16:9 para o spread completo (L+R)
  let sw = availW;
  let sh = Math.round(sw * 9/16);
  if (sh > availH) { sh = availH; sw = Math.round(sh * 16/9); }

  // Garante não ultrapassar
  sw = Math.min(sw, availW);
  sh = Math.min(sh, availH);

  const pw = Math.floor(sw/2);
  const ph = Math.floor(sh);
  return { pw, ph, sw: pw*2, sh: ph };
}

// ══════════════════════════════════════
// REBUILD — destroi e recria tudo
// ══════════════════════════════════════
function rebuild() {
  // Destrói instância anterior
  if (pf) { try { pf.destroy(); } catch(e){} pf=null; }

  // Recria páginas
  container.innerHTML = '';
  SRCS.forEach(src => {
    const div = document.createElement('div');
    div.className = 'page';
    const img = document.createElement('img');
    img.src = src; img.alt = '';
    div.appendChild(img);
    container.appendChild(div);
  });

  const {pw, ph, sw, sh} = calcSize();

  // Aplica tamanhos explícitos
  wrapper.style.width    = sw+'px';
  wrapper.style.height   = sh+'px';
  container.style.width  = sw+'px';
  container.style.height = sh+'px';

  document.querySelectorAll('.page').forEach(p => {
    p.style.width  = pw+'px';
    p.style.height = ph+'px';
  });

  pf = new St.PageFlip(container, {
    width:    pw,
    height:   ph,
    size:     'fixed',
    minWidth:  pw, maxWidth:  pw,
    minHeight: ph, maxHeight: ph,
    drawShadow:          true,
    flippingTime:        700,
    usePortrait:         false,
    startZIndex:         0,
    autoSize:            false,
    maxShadowOpacity:    0.55,
    showCover:           false,
    mobileScrollSupport: false,
    clickEventForward:   false,
    useMouseEvents:      true,
    swipeDistance:       25,
    showPageCorners:     true,
    disableFlipByClick:  false,
  });

  pf.loadFromHTML(document.querySelectorAll('.page'));

  pf.on('flip', e => { updateUI(e.data); hideHint(); });

  pf.on('init', () => {
    if (!didInit) {
      didInit = true;
      setTimeout(()=>document.getElementById('loader').classList.add('out'), 350);
    }
    // Restaura página após rebuild
    if (curSpread > 0) {
      setTimeout(()=>{ if(pf) pf.flip(curSpread*2); }, 150);
    } else {
      updateUI(0);
    }
  });
}

// Botões
btnPrev.onclick = ()=>{ if(pf){pf.flipPrev();hideHint();} };
btnNext.onclick = ()=>{ if(pf){pf.flipNext();hideHint();} };

document.addEventListener('keydown', e=>{
  if(!pf) return;
  if(e.key==='ArrowRight'||e.key==='ArrowDown'){pf.flipNext();hideHint();}
  if(e.key==='ArrowLeft' ||e.key==='ArrowUp')  {pf.flipPrev();hideHint();}
});

function hideHint(){ if(hintOn){hintEl.classList.add('out');hintOn=false;} }
setTimeout(hideHint, 5000);

// ══════════════════════════════════════
// RESIZE / ORIENTAÇÃO
// Debounce 300ms para não rebuildar
// durante a animação de orientação
// ══════════════════════════════════════
let rsTimer=null;

function scheduleRebuild() {
  clearTimeout(rsTimer);
  rsTimer = setTimeout(rebuild, 300);
}

window.addEventListener('resize', scheduleRebuild);

// orientationchange dispara ANTES do resize no iOS
// Esperamos 500ms para o browser terminar de reorientar
window.addEventListener('orientationchange', ()=>{
  clearTimeout(rsTimer);
  rsTimer = setTimeout(rebuild, 500);
});

// visualViewport resize (mais confiável em mobile)
if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', scheduleRebuild);
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}

rebuild();
</script>
</body>
</html>
