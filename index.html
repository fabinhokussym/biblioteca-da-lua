<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="blank">
<meta name="mobile-web-app-capable" content="yes">
<title>A Páscoa da Lua — Biblioteca da Lua</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }

html, body {
  width:100%; height:100%;
  overflow:hidden;
  font-family: Georgia, serif;
  user-select:none; -webkit-user-select:none;
  touch-action:none;
}

/* ── FUNDO ── */
body {
  background: linear-gradient(135deg, #fdf6ee 0%, #f5ede0 50%, #fdf0e0 100%);
}

/* ── LOGO canto inferior esquerdo ── */
#logo {
  position:fixed; bottom:18px; left:18px; z-index:100;
  display:flex; align-items:center; gap:6px;
  opacity:0.7; pointer-events:none;
  transition: opacity 0.3s;
}
#logo:hover { opacity:1; }
#logo-moon { font-size:18px; }
#logo-text {
  font-size:10px; letter-spacing:1.8px; color:#b07040;
  text-transform:uppercase; font-family:Georgia,serif;
  line-height:1.2;
}

/* ── TÍTULO TOPO — só desktop ── */
#topbar {
  position:fixed; top:0; left:0; right:0; z-index:50;
  display:flex; align-items:center; justify-content:center;
  padding:14px 20px 10px;
  pointer-events:none;
}
#topbar h1 {
  font-size:13px; font-weight:normal; letter-spacing:2.5px;
  color:#b07040; text-transform:uppercase; opacity:0.7;
}

/* ── STAGE ── */
#stage {
  position:fixed; inset:0; z-index:10;
  display:flex; align-items:center; justify-content:center;
}

/* ── LIVRO ── */
#bookWrap {
  position:relative;
  width: min(88vw, 152vh);
  height: min(49.5vw, 85.5vh);
}

/* Sombra do livro */
#bookShadow {
  position:absolute;
  bottom:-22px; left:4%; right:4%; height:24px;
  background: radial-gradient(ellipse at 50% 0%, rgba(100,60,10,0.22) 0%, transparent 72%);
  pointer-events:none; z-index:0;
}

#book {
  position:relative;
  width:100%; height:100%;
  overflow:hidden;
  border-radius:2px 8px 8px 2px;
  box-shadow:
    -2px 0 8px rgba(0,0,0,0.08),
    2px 0 30px rgba(100,60,10,0.12),
    0 4px 40px rgba(100,60,10,0.18);
  z-index:1;
}

/* Imagem de fundo (página atual) */
#baseImg {
  position:absolute; inset:0;
  width:100%; height:100%;
  object-fit:cover; display:block;
  pointer-events:none;
}

/* Lombada central */
#spine {
  position:absolute; top:0; bottom:0;
  left:calc(50% - 1px); width:2px;
  background: linear-gradient(to right,
    rgba(80,40,0,0) 0%,
    rgba(80,40,0,0.18) 40%,
    rgba(80,40,0,0.32) 50%,
    rgba(80,40,0,0.18) 60%,
    rgba(80,40,0,0) 100%
  );
  z-index:5; pointer-events:none;
}

/* Canvas do efeito flip */
#flipCanvas {
  position:absolute; inset:0;
  width:100%; height:100%;
  z-index:20; pointer-events:none;
}

/* ── ZONAS CLICÁVEIS ── */
.zone {
  position:absolute; top:0; bottom:0; width:28%;
  z-index:30; cursor:pointer;
  display:flex; align-items:center;
}
#zoneL { left:0; justify-content:flex-start; }
#zoneR { right:0; justify-content:flex-end; }

.zone-arrow {
  width:42px; height:42px; border-radius:50%;
  background:rgba(255,255,255,0.88);
  border:1px solid rgba(180,120,50,0.2);
  display:flex; align-items:center; justify-content:center;
  font-size:24px; color:#c07838;
  opacity:0; transition:opacity 0.2s, transform 0.2s;
  pointer-events:none;
  box-shadow: 0 2px 14px rgba(140,80,20,0.14);
}
#zoneL .zone-arrow { margin-left:14px; }
#zoneR .zone-arrow { margin-right:14px; }
#zoneL:hover .zone-arrow { opacity:1; transform:translateX(-4px); }
#zoneR:hover .zone-arrow { opacity:1; transform:translateX(4px); }
.zone.off { pointer-events:none; }
.zone.off .zone-arrow { display:none; }

/* ── CONTROLES ── */
#controls {
  position:fixed; bottom:0; left:0; right:0; z-index:50;
  display:flex; align-items:center; justify-content:center;
  gap:24px; padding:10px 20px 14px;
}

#dots { display:flex; gap:7px; align-items:center; }
.dot {
  width:7px; height:7px; border-radius:50%;
  background:rgba(160,100,40,0.18);
  cursor:pointer; transition:all 0.25s;
  border:1px solid rgba(160,100,40,0.12);
}
.dot.on {
  background:#d4884a; transform:scale(1.4);
  border-color:#d4884a;
}

#counter {
  font-size:11px; color:#b07848; letter-spacing:1.8px;
  opacity:0.65; min-width:48px; text-align:center;
}

/* ── HINT ── */
#hint {
  position:fixed; bottom:48px; left:50%; transform:translateX(-50%);
  background:rgba(255,255,255,0.88);
  color:#b07040; font-size:11px; letter-spacing:0.4px;
  padding:5px 14px; border-radius:20px;
  border:1px solid rgba(180,120,50,0.18);
  z-index:50; pointer-events:none; white-space:nowrap;
  box-shadow:0 2px 10px rgba(140,80,20,0.1);
  transition:opacity 1.5s;
}
#hint.out { opacity:0; }

/* ── LOADER ── */
#loader {
  position:fixed; inset:0; z-index:999;
  background:#fdf6ee;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:18px;
  transition:opacity 0.9s;
}
#loader.out { opacity:0; pointer-events:none; }
.moon-anim { font-size:52px; animation:float 2s ease-in-out infinite; }
@keyframes float {
  0%,100%{ transform:translateY(0) rotate(-8deg); }
  50%{ transform:translateY(-12px) rotate(8deg); }
}
#loader-title {
  font-size:18px; color:#c07838; letter-spacing:2.5px;
  font-style:italic; opacity:0.85;
}
#loader-sub {
  font-size:11px; color:#c09060; letter-spacing:2px; opacity:0.55;
}

/* ── MOBILE: tela cheia ── */
@media (max-width: 768px) {
  body { background:#000; }

  #topbar { display:none; }

  #stage { background:#000; }

  #bookWrap {
    width:100vw;
    height:56.25vw; /* 16:9 */
    /* centraliza verticalmente */
    position:absolute;
    top:50%; left:0;
    transform:translateY(-50%);
  }

  #book {
    border-radius:0;
    box-shadow: none;
  }

  #bookShadow { display:none; }

  #controls { background:rgba(0,0,0,0.55); padding:8px 16px 10px; }
  .dot { background:rgba(255,255,255,0.25); border-color:rgba(255,255,255,0.1); }
  .dot.on { background:#f4a835; border-color:#f4a835; }
  #counter { color:rgba(255,255,255,0.55); }

  #hint {
    background:rgba(0,0,0,0.55); color:rgba(255,255,255,0.7);
    border-color:rgba(255,255,255,0.1);
  }

  #logo { bottom:52px; left:12px; }
  #logo-moon { font-size:14px; }
  #logo-text { color:rgba(255,255,255,0.55); font-size:9px; }

  .zone-arrow {
    background:rgba(255,255,255,0.15);
    border-color:rgba(255,255,255,0.2);
    color:#fff;
  }
}
</style>
</head>
<body>

<div id="loader">
  <div class="moon-anim">🌙</div>
  <p id="loader-title">Biblioteca da Lua</p>
  <p id="loader-sub">Abrindo o livro...</p>
</div>

<div id="topbar"><h1>A Páscoa da Lua</h1></div>

<div id="stage">
  <div id="bookWrap">
    <div id="bookShadow"></div>
    <div id="book">
      <img id="baseImg" src="" alt="">
      <div id="spine"></div>
      <canvas id="flipCanvas"></canvas>
      <div class="zone off" id="zoneL"><div class="zone-arrow">&#8249;</div></div>
      <div class="zone" id="zoneR"><div class="zone-arrow">&#8250;</div></div>
    </div>
  </div>
</div>

<div id="hint">👆 clique nas laterais para virar a página</div>

<div id="controls">
  <span id="counter">1 / 12</span>
  <div id="dots"></div>
</div>

<!-- Logo Biblioteca da Lua -->
<div id="logo">
  <span id="logo-moon">🌙</span>
  <span id="logo-text">Biblioteca<br>da Lua</span>
</div>

<script>
// ════════════════════════════
// CONFIG
// ════════════════════════════
const IMAGES = [
  '00.jpg','01.jpg','02.jpg','03.jpg',
  '04.jpg','05.jpg','06.jpg','07.jpg',
  '08.jpg','09.jpg','10.jpg','11.jpg'
];
const TOTAL    = IMAGES.length;
const DURATION = 750; // ms — mais suave

// Pré-carrega todas as imagens
const imgs = IMAGES.map(src => {
  const i = new Image();
  i.src = src;
  return i;
});

let cur      = 0;
let flipping = false;
let hintOn   = true;

// ════════════════════════════
// ELEMENTOS
// ════════════════════════════
const book      = document.getElementById('book');
const baseImg   = document.getElementById('baseImg');
const canvas    = document.getElementById('flipCanvas');
const ctx       = canvas.getContext('2d');
const dotsEl    = document.getElementById('dots');
const zoneL     = document.getElementById('zoneL');
const zoneR     = document.getElementById('zoneR');
const hintEl    = document.getElementById('hint');
const counterEl = document.getElementById('counter');

// Dots
IMAGES.forEach((_,i) => {
  const d = document.createElement('div');
  d.className = 'dot' + (i===0?' on':'');
  d.onclick = () => { if(!flipping && i!==cur) flip(i>cur?1:-1); };
  dotsEl.appendChild(d);
});

// ════════════════════════════
// UI
// ════════════════════════════
function ui() {
  baseImg.src = imgs[cur].src;
  counterEl.textContent = `${cur+1} / ${TOTAL}`;
  dotsEl.querySelectorAll('.dot').forEach((d,i) => d.classList.toggle('on', i===cur));
  zoneL.classList.toggle('off', cur===0);
  zoneR.classList.toggle('off', cur===TOTAL-1);
}

// ════════════════════════════
// RESIZE CANVAS
// ════════════════════════════
function resize() {
  canvas.width  = book.offsetWidth;
  canvas.height = book.offsetHeight;
}
new ResizeObserver(resize).observe(book);
resize();

// ════════════════════════════
// EFEITO DE PÁGINA — realista
// Usa curva cúbica de Bezier para
// simular a curvatura do papel
// ════════════════════════════
function flip(dir) {
  if (flipping) return;
  const next = cur + dir;
  if (next<0 || next>=TOTAL) return;
  flipping = true;
  hideHint();

  const W = canvas.width;
  const H = canvas.height;
  const from = imgs[cur];
  const to   = imgs[next];
  const fwd  = dir > 0;
  const t0   = performance.now();

  function ease(x) {
    // ease in-out quint — mais suave nas bordas
    return x < 0.5 ? 16*x**5 : 1 - (-2*x+2)**5/2;
  }

  function drawImg(img, x, y, w, h) {
    if (img && img.complete && img.naturalWidth>0)
      ctx.drawImage(img, x, y, w, h);
  }

  function frame(now) {
    const raw = Math.min((now-t0)/DURATION, 1);
    const t   = ease(raw);

    ctx.clearRect(0, 0, W, H);

    if (fwd) {
      // ── PÁGINA VIRA PARA FRENTE (direita → esquerda) ──

      // 1. Página de destino embaixo
      drawImg(to, 0, 0, W, H);

      // 2. Posição da dobra — começa na direita e vai para a esquerda
      const foldX = W * (1 - t);

      // 3. Parte estática da página atual (à esquerda da dobra)
      if (foldX > 0) {
        ctx.save();
        ctx.beginPath(); ctx.rect(0, 0, foldX, H); ctx.clip();
        drawImg(from, 0, 0, W, H);
        ctx.restore();
      }

      // 4. Parte que está virando (comprime em perspectiva)
      const foldW  = W - foldX;
      if (foldW > 0.5) {
        // Compressão: cos(ângulo) — dá o efeito de perspectiva 3D
        const angle   = t * Math.PI;
        const cosA    = Math.cos(angle);
        const absCosA = Math.abs(cosA);

        ctx.save();
        // Clippa só a região da dobra
        ctx.beginPath(); ctx.rect(foldX, 0, W-foldX, H); ctx.clip();
        ctx.translate(foldX, 0);

        // Espessura visual da dobra
        const visW = foldW * absCosA;

        if (t < 0.5) {
          // Primeira metade: frente da folha virando (imagem espelhada comprimindo)
          if (visW > 0.5) {
            ctx.save();
            ctx.transform(-absCosA, 0, 0, 1, 0, 0); // espelha + comprime
            drawImg(from, -(W - foldW*2), 0, W, H);
            ctx.restore();
          }
        } else {
          // Segunda metade: verso mostrando a próxima página
          if (visW > 0.5) {
            ctx.save();
            ctx.transform(absCosA, 0, 0, 1, 0, 0); // comprime
            drawImg(to, 0, 0, W, H);
            ctx.restore();
          }
        }

        // Sombra na borda da dobra
        const sg = ctx.createLinearGradient(0, 0, Math.min(foldW*0.3, 28), 0);
        sg.addColorStop(0, `rgba(0,0,0,${0.35 * Math.sin(angle)})`);
        sg.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = sg;
        ctx.fillRect(0, 0, Math.min(foldW*0.3+2, 30), H);

        // Brilho na dobra
        const shine = ctx.createLinearGradient(0, 0, Math.min(visW*0.25, 16), 0);
        shine.addColorStop(0, `rgba(255,255,255,${0.28 * Math.sin(angle)})`);
        shine.addColorStop(1, 'rgba(255,255,255,0)');
        ctx.fillStyle = shine;
        ctx.fillRect(0, 0, Math.min(visW*0.25+1, 18), H);

        ctx.restore();
      }

      // 5. Sombra projetada da folha virando sobre a página embaixo
      if (foldX > 1) {
        const shadow = ctx.createLinearGradient(foldX, 0, Math.max(foldX-50, 0), 0);
        shadow.addColorStop(0, `rgba(0,0,0,${0.20 * Math.sin(t*Math.PI)})`);
        shadow.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = shadow;
        ctx.fillRect(Math.max(foldX-50, 0), 0, 50, H);
      }

    } else {
      // ── PÁGINA VIRA PARA TRÁS (esquerda → direita) ──

      drawImg(to, 0, 0, W, H);

      const foldX = W * t;

      // Parte estática da página atual (à direita)
      if (W - foldX > 0) {
        ctx.save();
        ctx.beginPath(); ctx.rect(foldX, 0, W-foldX, H); ctx.clip();
        drawImg(from, 0, 0, W, H);
        ctx.restore();
      }

      // Parte virando
      if (foldX > 0.5) {
        const angle   = t * Math.PI;
        const cosA    = Math.cos(angle);
        const absCosA = Math.abs(cosA);

        ctx.save();
        ctx.beginPath(); ctx.rect(0, 0, foldX, H); ctx.clip();
        ctx.translate(foldX, 0);

        const visW = foldX * absCosA;

        if (t < 0.5) {
          if (visW > 0.5) {
            ctx.save();
            ctx.transform(-absCosA, 0, 0, 1, 0, 0);
            drawImg(from, 0, 0, W, H, -W, 0, W, H);
            ctx.restore();
          }
        } else {
          if (visW > 0.5) {
            ctx.save();
            ctx.transform(-absCosA, 0, 0, 1, 0, 0);
            drawImg(to, 0, 0, W, H, -W, 0, W, H);
            ctx.restore();
          }
        }

        // Sombra na dobra
        const sg = ctx.createLinearGradient(0, 0, -Math.min(foldX*0.3, 28), 0);
        sg.addColorStop(0, `rgba(0,0,0,${0.32 * Math.sin(angle)})`);
        sg.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = sg;
        ctx.fillRect(-Math.min(foldX*0.3+2, 30), 0, Math.min(foldX*0.3+2, 30), H);

        // Brilho
        const shine = ctx.createLinearGradient(0, 0, -Math.min(visW*0.25, 14), 0);
        shine.addColorStop(0, `rgba(255,255,255,${0.24 * Math.sin(angle)})`);
        shine.addColorStop(1, 'rgba(255,255,255,0)');
        ctx.fillStyle = shine;
        ctx.fillRect(-Math.min(visW*0.25+1, 16), 0, Math.min(visW*0.25+1, 16), H);

        ctx.restore();
      }

      // Sombra projetada
      if (foldX < W-1) {
        const shadow = ctx.createLinearGradient(foldX, 0, Math.min(foldX+50, W), 0);
        shadow.addColorStop(0, `rgba(0,0,0,${0.18 * Math.sin(t*Math.PI)})`);
        shadow.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = shadow;
        ctx.fillRect(foldX, 0, 50, H);
      }
    }

    if (raw < 1) {
      requestAnimationFrame(frame);
    } else {
      ctx.clearRect(0, 0, W, H);
      cur = next;
      ui();
      flipping = false;
    }
  }

  requestAnimationFrame(frame);
}

// ════════════════════════════
// CONTROLES
// ════════════════════════════
zoneL.onclick = () => flip(-1);
zoneR.onclick = () => flip(1);

document.addEventListener('keydown', e => {
  if (e.key==='ArrowRight'||e.key==='ArrowDown') flip(1);
  if (e.key==='ArrowLeft' ||e.key==='ArrowUp')   flip(-1);
});

// Touch swipe
let tx0=0, ty0=0, tt0=0;
document.addEventListener('touchstart', e => {
  tx0=e.touches[0].clientX; ty0=e.touches[0].clientY; tt0=Date.now();
}, {passive:true});
document.addEventListener('touchend', e => {
  if (flipping) return;
  const dx = e.changedTouches[0].clientX - tx0;
  const dy = e.changedTouches[0].clientY - ty0;
  if (Math.abs(dx)>40 && Math.abs(dx)>Math.abs(dy) && Date.now()-tt0<500)
    flip(dx<0?1:-1);
}, {passive:true});

// ════════════════════════════
// HINT
// ════════════════════════════
function hideHint() {
  if (hintOn) { hintEl.classList.add('out'); hintOn=false; }
}
setTimeout(hideHint, 5000);

// ════════════════════════════
// LOADER
// ════════════════════════════
let loaded = 0;
function onLoad() {
  loaded++;
  if (loaded >= TOTAL) {
    ui();
    setTimeout(() => document.getElementById('loader').classList.add('out'), 350);
  }
}
imgs.forEach(img => {
  if (img.complete && img.naturalWidth>0) onLoad();
  else { img.addEventListener('load',onLoad); img.addEventListener('error',onLoad); }
});
setTimeout(() => { document.getElementById('loader').classList.add('out'); ui(); }, 7000);

ui();
</script>
</body>
</html>
