<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Biblioteca da Lua">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#fdf6ee">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>A Páscoa da Lua — Biblioteca da Lua</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }

html, body {
  width:100%; height:100%; overflow:hidden;
  font-family: Georgia, serif;
  user-select:none; -webkit-user-select:none;
  touch-action:none;
  background: linear-gradient(160deg, #fdf8f0 0%, #f5e8d8 50%, #fdf4e8 100%);
}

#topbar {
  position:fixed; top:0; left:0; right:0; z-index:50;
  display:flex; align-items:center; justify-content:center;
  padding:13px 0 0; pointer-events:none;
}
#topbar h1 {
  font-size:12px; font-weight:normal; letter-spacing:2.5px;
  color:#a06830; text-transform:uppercase; opacity:0.6;
}

#stage {
  position:fixed; inset:0; z-index:10;
  display:flex; align-items:center; justify-content:center;
}

#book-wrap {
  position:relative;
}
#book-wrap::after {
  content:'';
  position:absolute;
  bottom:-18px; left:4%; right:4%; height:20px;
  background: radial-gradient(ellipse at 50% 0%, rgba(90,50,10,0.16) 0%, transparent 70%);
  pointer-events:none;
}

#canvas {
  display:block;
  border-radius:3px 8px 8px 3px;
  box-shadow:
    0 2px 8px rgba(0,0,0,0.07),
    0 8px 40px rgba(100,60,10,0.14);
  cursor:pointer;
}

/* Botões */
.nav-btn {
  position:fixed; top:50%; transform:translateY(-50%);
  width:46px; height:46px; border-radius:50%;
  background:rgba(255,255,255,0.92);
  border:1px solid rgba(160,100,40,0.2);
  display:flex; align-items:center; justify-content:center;
  font-size:26px; color:#b07030; cursor:pointer; z-index:50;
  box-shadow:0 2px 14px rgba(120,70,10,0.12);
  transition:opacity 0.2s, transform 0.15s;
  line-height:1;
}
.nav-btn:hover { transform:translateY(-50%) scale(1.07); }
.nav-btn:active { transform:translateY(-50%) scale(0.94); }
.nav-btn.off { opacity:0; pointer-events:none; }
#btnPrev { left:14px; }
#btnNext { right:14px; }

/* Controles */
#controls {
  position:fixed; bottom:0; left:0; right:0; z-index:50;
  display:flex; align-items:center; justify-content:center;
  gap:20px; padding:10px 20px 14px;
}
#dots { display:flex; gap:7px; align-items:center; }
.dot {
  width:7px; height:7px; border-radius:50%;
  background:rgba(150,90,30,0.18); cursor:pointer;
  border:1px solid rgba(150,90,30,0.12); transition:all 0.22s;
}
.dot.on { background:#d4884a; transform:scale(1.45); border-color:#d4884a; }
#counter { font-size:11px; color:#a07040; letter-spacing:1.8px; opacity:0.6; min-width:46px; text-align:center; }

/* Logo */
#logo {
  position:fixed; bottom:15px; left:16px; z-index:100;
  display:flex; align-items:center; gap:5px; opacity:0.48; pointer-events:none;
}
#logo-moon { font-size:15px; line-height:1; }
#logo-text { font-size:9px; letter-spacing:1.5px; color:#a06830; text-transform:uppercase; line-height:1.35; }

/* Hint */
#hint {
  position:fixed; bottom:46px; left:50%; transform:translateX(-50%);
  background:rgba(255,255,255,0.9); color:#a06830;
  font-size:11px; padding:5px 14px; border-radius:20px;
  border:1px solid rgba(160,100,40,0.15);
  z-index:50; pointer-events:none; white-space:nowrap;
  transition:opacity 1.5s;
}
#hint.out { opacity:0; }

/* Loader */
#loader {
  position:fixed; inset:0; z-index:999;
  background:#fdf6ee;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:18px;
  transition:opacity 0.9s;
}
#loader.out { opacity:0; pointer-events:none; }
.moon-anim { font-size:54px; animation:float 2s ease-in-out infinite; }
@keyframes float {
  0%,100%{ transform:translateY(0) rotate(-8deg); }
  50%{ transform:translateY(-12px) rotate(8deg); }
}
#loader-title { font-size:18px; color:#c07838; letter-spacing:2.5px; font-style:italic; opacity:0.85; }
#loader-sub { font-size:11px; color:#c09060; letter-spacing:2px; opacity:0.5; }

/* Mobile */
@media (max-width:768px) {
  html,body { background:#111; }
  #topbar { display:none; }
  #stage { background:#111; }
  #book-wrap::after { display:none; }
  #canvas { border-radius:0; box-shadow:none; }
  #controls { background:rgba(0,0,0,0.55); backdrop-filter:blur(4px); padding:7px 16px 10px; }
  .dot { background:rgba(255,255,255,0.2); border-color:rgba(255,255,255,0.08); }
  .dot.on { background:#f4a835; border-color:#f4a835; }
  #counter { color:rgba(255,255,255,0.4); }
  .nav-btn { background:rgba(255,255,255,0.12); border-color:rgba(255,255,255,0.15); color:#fff; box-shadow:none; }
  #logo { bottom:46px; }
  #logo-moon { font-size:13px; }
  #logo-text { color:rgba(255,255,255,0.38); }
  #hint { background:rgba(0,0,0,0.55); color:rgba(255,255,255,0.6); border-color:rgba(255,255,255,0.08); bottom:48px; }
  #loader { background:#0d0700; }
  #loader-title { color:#e89040; }
}
</style>
</head>
<body>

<div id="loader">
  <div class="moon-anim">🌙</div>
  <p id="loader-title">Biblioteca da Lua</p>
  <p id="loader-sub">Abrindo o livro...</p>
</div>

<div id="topbar"><h1>A Páscoa da Lua</h1></div>

<div id="stage">
  <div id="book-wrap">
    <canvas id="canvas"></canvas>
  </div>
</div>

<button class="nav-btn off" id="btnPrev">&#8249;</button>
<button class="nav-btn" id="btnNext">&#8250;</button>

<div id="hint">👆 clique nas laterais para virar a página</div>
<div id="controls">
  <span id="counter">1 / 12</span>
  <div id="dots"></div>
</div>
<div id="logo">
  <span id="logo-moon">🌙</span>
  <span id="logo-text">Biblioteca<br>da Lua</span>
</div>

<script>
// ══════════════════════════════
// CONFIG
// ══════════════════════════════
const SRCS = [
  '00.jpg','01.jpg','02.jpg','03.jpg',
  '04.jpg','05.jpg','06.jpg','07.jpg',
  '08.jpg','09.jpg','10.jpg','11.jpg'
];
const TOTAL    = SRCS.length;
const FLIP_MS  = 700;

// ── Pré-carrega ──
const bitmaps = new Array(TOTAL).fill(null);
let  loadedN  = 0;

function preload(cb) {
  SRCS.forEach((src, i) => {
    const img = new Image();
    img.onload = img.onerror = () => {
      // Converte para ImageBitmap para desenho sem artefatos
      if (img.naturalWidth > 0) {
        createImageBitmap(img).then(bm => {
          bitmaps[i] = bm;
          if (++loadedN >= TOTAL) cb();
        }).catch(() => { bitmaps[i] = img; if (++loadedN >= TOTAL) cb(); });
      } else {
        if (++loadedN >= TOTAL) cb();
      }
    };
    img.src = src;
  });
  // Fallback
  setTimeout(cb, 8000);
}

// ── Estado ──
let cur     = 0;
let flipping = false;
let hintOn  = true;

// ── DOM ──
const canvas    = document.getElementById('canvas');
const ctx       = canvas.getContext('2d');
const dotsEl    = document.getElementById('dots');
const counterEl = document.getElementById('counter');
const btnPrev   = document.getElementById('btnPrev');
const btnNext   = document.getElementById('btnNext');
const hintEl    = document.getElementById('hint');
const wrap      = document.getElementById('book-wrap');

// Dots
SRCS.forEach((_,i) => {
  const d = document.createElement('div');
  d.className = 'dot'+(i===0?' on':'');
  d.onclick   = () => { if(!flipping && i!==cur) startFlip(i > cur ? 1 : -1, i); };
  dotsEl.appendChild(d);
});

// ── Dimensões ──
let W = 0, H = 0;

function calcSize() {
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  const mob = vw <= 768;
  let w, h;
  if (mob) {
    w = vw; h = Math.round(vw * 9/16);
  } else {
    const mxW = vw * 0.86, mxH = vh * 0.84;
    w = Math.min(mxW, mxH * 16/9);
    h = Math.round(w * 9/16);
    if (h > mxH) { h = mxH; w = Math.round(h * 16/9); }
  }
  return { w: Math.floor(w), h: Math.floor(h) };
}

function applySize() {
  const { w, h } = calcSize();
  W = w; H = h;
  canvas.width  = W;
  canvas.height = H;
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';
}

// ── Desenha bitmap no canvas ──
function drawBitmap(bm, x, y, w, h) {
  if (!bm) return;
  ctx.drawImage(bm, x, y, w, h);
}

// ── Render estático ──
function render() {
  ctx.clearRect(0, 0, W, H);
  drawBitmap(bitmaps[cur], 0, 0, W, H);
}

// ── UI ──
function updateUI(page) {
  cur = page;
  counterEl.textContent = `${page+1} / ${TOTAL}`;
  dotsEl.querySelectorAll('.dot').forEach((d,i) => d.classList.toggle('on', i===page));
  btnPrev.classList.toggle('off', page === 0);
  btnNext.classList.toggle('off', page === TOTAL-1);
}

// ══════════════════════════════
// FLIP ENGINE — página única
// Sem espelhamento — apenas
// compressão + reveal limpo
// ══════════════════════════════
function startFlip(dir, targetPage) {
  if (flipping) return;
  const next = targetPage !== undefined ? targetPage : cur + dir;
  if (next < 0 || next >= TOTAL) return;

  flipping = true;
  hideHint();

  const fwd   = next > cur;
  const fromI = cur;
  const toI   = next;
  const t0    = performance.now();

  // ease in-out quart
  const ease = x => x < 0.5 ? 8*x**4 : 1-(-2*x+2)**4/2;

  function frame(now) {
    const raw = Math.min((now - t0) / FLIP_MS, 1);
    const t   = ease(raw);

    // sin do ângulo — para sombra dinâmica
    const sinT = Math.sin(t * Math.PI);

    ctx.clearRect(0, 0, W, H);

    if (fwd) {
      // ── AVANÇAR ──
      // Fase 1 (t < 0.5): página atual comprime da direita para o centro
      // Fase 2 (t > 0.5): próxima página expande do centro para a direita

      if (t <= 0.5) {
        // Página atual ainda visível, comprimindo
        // A largura visível vai de W até 0 (primeira metade)
        const visW = Math.round(W * (1 - t * 2)); // W → 0

        if (visW > 0) {
          // Desenha a fatia esquerda da página atual (sem distorção)
          ctx.drawImage(bitmaps[fromI],
            0, 0, visW * (W / visW || 1), H, // src: proporção original
            0, 0, visW, H                     // dst: comprimida
          );

          // Sombra na borda direita (dobra)
          const sg = ctx.createLinearGradient(visW, 0, Math.max(visW - 40, 0), 0);
          sg.addColorStop(0, `rgba(0,0,0,${0.45 * sinT})`);
          sg.addColorStop(1, 'rgba(0,0,0,0)');
          ctx.fillStyle = sg;
          ctx.fillRect(Math.max(visW - 40, 0), 0, 40, H);

          // Brilho na borda (efeito papel)
          const bg = ctx.createLinearGradient(visW, 0, Math.max(visW - 12, 0), 0);
          bg.addColorStop(0, `rgba(255,255,255,${0.35 * sinT})`);
          bg.addColorStop(1, 'rgba(255,255,255,0)');
          ctx.fillStyle = bg;
          ctx.fillRect(Math.max(visW - 12, 0), 0, 12, H);
        }

      } else {
        // Próxima página expandindo da esquerda
        const visW = Math.round(W * ((t - 0.5) * 2)); // 0 → W

        if (visW > 0) {
          // Desenha a próxima página (fatia esquerda expandindo)
          ctx.drawImage(bitmaps[toI],
            0, 0, W, H,          // src: imagem completa
            0, 0, visW, H        // dst: mostra da esquerda até visW
          );

          // Fundo preto atrás da parte ainda não revelada
          ctx.fillStyle = '#0a0600';
          ctx.fillRect(visW, 0, W - visW, H);

          // Sombra na borda esquerda da nova página (vindo do escuro)
          const sg = ctx.createLinearGradient(0, 0, Math.min(40, visW), 0);
          sg.addColorStop(0, `rgba(0,0,0,${0.4 * sinT})`);
          sg.addColorStop(1, 'rgba(0,0,0,0)');
          ctx.fillStyle = sg;
          ctx.fillRect(0, 0, Math.min(40, visW), H);

          // Brilho na borda
          const bg = ctx.createLinearGradient(0, 0, Math.min(12, visW), 0);
          bg.addColorStop(0, `rgba(255,255,255,${0.3 * sinT})`);
          bg.addColorStop(1, 'rgba(255,255,255,0)');
          ctx.fillStyle = bg;
          ctx.fillRect(0, 0, Math.min(12, visW), H);
        } else {
          ctx.fillStyle = '#0a0600';
          ctx.fillRect(0, 0, W, H);
        }
      }

    } else {
      // ── VOLTAR ──
      // Fase 1 (t < 0.5): página atual comprime da esquerda para o centro
      // Fase 2 (t > 0.5): página anterior expande do centro para a esquerda

      if (t <= 0.5) {
        const visW = Math.round(W * (1 - t * 2));

        if (visW > 0) {
          // Página atual comprimindo — aparece no lado direito
          ctx.drawImage(bitmaps[fromI],
            0, 0, W, H,
            W - visW, 0, visW, H
          );

          // Sombra na borda esquerda
          const sg = ctx.createLinearGradient(W - visW, 0, W - visW + 40, 0);
          sg.addColorStop(0, `rgba(0,0,0,${0.45 * sinT})`);
          sg.addColorStop(1, 'rgba(0,0,0,0)');
          ctx.fillStyle = sg;
          ctx.fillRect(W - visW, 0, 40, H);

          const bg = ctx.createLinearGradient(W - visW, 0, W - visW + 12, 0);
          bg.addColorStop(0, `rgba(255,255,255,${0.35 * sinT})`);
          bg.addColorStop(1, 'rgba(255,255,255,0)');
          ctx.fillStyle = bg;
          ctx.fillRect(W - visW, 0, 12, H);

          // Fundo escuro à esquerda
          ctx.fillStyle = '#0a0600';
          ctx.fillRect(0, 0, W - visW, H);

        } else {
          ctx.fillStyle = '#0a0600';
          ctx.fillRect(0, 0, W, H);
        }

      } else {
        const visW = Math.round(W * ((t - 0.5) * 2));

        if (visW > 0) {
          // Página anterior expandindo da direita
          ctx.drawImage(bitmaps[toI],
            W - visW, 0, visW, H,   // src: fatia direita
            W - visW, 0, visW, H    // dst: mesma posição
          );

          // Fundo escuro à esquerda do que ainda não apareceu
          ctx.fillStyle = '#0a0600';
          ctx.fillRect(0, 0, W - visW, H);

          // Sombra na borda
          const sg = ctx.createLinearGradient(W, 0, W - Math.min(40, visW), 0);
          sg.addColorStop(0, `rgba(0,0,0,${0.4 * sinT})`);
          sg.addColorStop(1, 'rgba(0,0,0,0)');
          ctx.fillStyle = sg;
          ctx.fillRect(W - Math.min(40, visW), 0, Math.min(40, visW), H);

          const bg = ctx.createLinearGradient(W, 0, W - Math.min(12, visW), 0);
          bg.addColorStop(0, `rgba(255,255,255,${0.3 * sinT})`);
          bg.addColorStop(1, 'rgba(255,255,255,0)');
          ctx.fillStyle = bg;
          ctx.fillRect(W - Math.min(12, visW), 0, Math.min(12, visW), H);
        } else {
          ctx.fillStyle = '#0a0600';
          ctx.fillRect(0, 0, W, H);
        }
      }
    }

    if (raw < 1) {
      requestAnimationFrame(frame);
    } else {
      cur = next;
      updateUI(cur);
      render();
      flipping = false;
    }
  }

  requestAnimationFrame(frame);
}

// ── Controles ──
btnPrev.onclick = () => startFlip(-1);
btnNext.onclick = () => startFlip(1);

canvas.addEventListener('click', e => {
  const x = e.offsetX / W;
  if (x > 0.6) startFlip(1);
  else if (x < 0.4) startFlip(-1);
});

document.addEventListener('keydown', e => {
  if (e.key==='ArrowRight'||e.key==='ArrowDown') startFlip(1);
  if (e.key==='ArrowLeft' ||e.key==='ArrowUp')   startFlip(-1);
});

// Touch swipe
let tx0=0, ty0=0, tt0=0;
document.addEventListener('touchstart', e => {
  tx0=e.touches[0].clientX; ty0=e.touches[0].clientY; tt0=Date.now();
}, {passive:true});
document.addEventListener('touchend', e => {
  if (flipping) return;
  const dx = e.changedTouches[0].clientX - tx0;
  const dy = e.changedTouches[0].clientY - ty0;
  if (Math.abs(dx)>40 && Math.abs(dx)>Math.abs(dy) && Date.now()-tt0<500)
    startFlip(dx < 0 ? 1 : -1);
}, {passive:true});

function hideHint() {
  if (hintOn) { hintEl.classList.add('out'); hintOn=false; }
}
setTimeout(hideHint, 5000);

// Resize
let rsTimer;
window.addEventListener('resize', () => {
  clearTimeout(rsTimer);
  rsTimer = setTimeout(() => { applySize(); render(); }, 200);
});

// Service Worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}

// ── Inicia ──
applySize();

preload(() => {
  render();
  updateUI(0);
  setTimeout(() => document.getElementById('loader').classList.add('out'), 350);
});
</script>
</body>
</html>
