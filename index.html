<!DOCTYPE html>
<!-- v13 -->
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Biblioteca da Lua">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#fdf6ee">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>A Páscoa da Lua — Biblioteca da Lua</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: #f5ece0;
  font-family: Georgia, serif;
  user-select: none;
  -webkit-user-select: none;
  touch-action: none;
}

/* Controles fixos na parte inferior */
#controls {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  z-index: 50;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  padding: 9px 20px 11px;
  background: rgba(245,236,224,0.92);
  backdrop-filter: blur(6px);
}

#dots { display: flex; gap: 6px; align-items: center; }
.dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: rgba(150,90,30,0.22);
  border: 1px solid rgba(150,90,30,0.14);
  cursor: pointer;
  transition: all 0.2s;
}
.dot.on { background: #d4884a; transform: scale(1.45); border-color: #d4884a; }

#counter {
  font-size: 11px; color: #a07040;
  letter-spacing: 1.5px; opacity: 0.65;
  min-width: 44px; text-align: center;
}

/* Stage — centraliza o livro na área disponível */
#stage {
  position: fixed;
  top: 0; left: 0; right: 0;
  /* bottom calculado via JS para deixar espaço pros controles */
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

/* O flip-book — tamanho definido via JS */
#flip-book {
  position: relative;
  box-shadow: 0 4px 36px rgba(100,60,10,0.18), 0 2px 8px rgba(0,0,0,0.08);
}

/* Lombada */
#spine {
  position: absolute;
  top: 0; bottom: 0;
  width: 6px;
  background: linear-gradient(to right,
    rgba(60,30,0,0) 0%,
    rgba(60,30,0,0.18) 35%,
    rgba(60,30,0,0.38) 50%,
    rgba(60,30,0,0.18) 65%,
    rgba(60,30,0,0) 100%
  );
  pointer-events: none;
  z-index: 100;
}

/* Páginas */
.page {
  overflow: hidden;
  background: #f0e8d8;
}
.page img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  pointer-events: none;
}

/* Logo */
#logo {
  position: fixed;
  bottom: 13px; left: 13px;
  z-index: 60;
  display: flex; align-items: center; gap: 4px;
  opacity: 0.4; pointer-events: none;
}
#logo span:first-child { font-size: 13px; }
#logo span:last-child {
  font-size: 8px; letter-spacing: 1.3px;
  color: #a06830; text-transform: uppercase; line-height: 1.3;
}

/* Hint */
#hint {
  position: fixed;
  bottom: 50px; left: 50%; transform: translateX(-50%);
  background: rgba(255,255,255,0.92); color: #a06830;
  font-size: 10px; padding: 4px 12px; border-radius: 20px;
  border: 1px solid rgba(160,100,40,0.15);
  z-index: 60; pointer-events: none; white-space: nowrap;
  transition: opacity 1.5s;
}
#hint.out { opacity: 0; }

/* Loader */
#loader {
  position: fixed; inset: 0; z-index: 999;
  background: #fdf6ee;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 18px;
  transition: opacity 0.9s;
}
#loader.out { opacity: 0; pointer-events: none; }
.moon-anim { font-size: 52px; animation: float 2s ease-in-out infinite; }
@keyframes float {
  0%, 100% { transform: translateY(0) rotate(-8deg); }
  50%       { transform: translateY(-12px) rotate(8deg); }
}
#loader-title { font-size: 18px; color: #c07838; letter-spacing: 2.5px; font-style: italic; opacity: 0.85; }
#loader-sub   { font-size: 11px; color: #c09060; letter-spacing: 2px; opacity: 0.5; }

/* Mobile */
@media (max-width: 768px) {
  html, body { background: #111; }
  #controls { background: rgba(0,0,0,0.65); backdrop-filter: blur(6px); }
  .dot { background: rgba(255,255,255,0.2); border-color: rgba(255,255,255,0.1); }
  .dot.on { background: #f4a835; border-color: #f4a835; }
  #counter { color: rgba(255,255,255,0.5); }
  #logo span:last-child { color: rgba(255,255,255,0.4); }
  #hint { background: rgba(0,0,0,0.6); color: rgba(255,255,255,0.7); border-color: rgba(255,255,255,0.1); }
  #loader { background: #0d0700; }
  #loader-title { color: #e89040; }
  #flip-book { box-shadow: none; }
}
</style>
</head>
<body>

<div id="loader">
  <div class="moon-anim">🌙</div>
  <p id="loader-title">Biblioteca da Lua</p>
  <p id="loader-sub">Abrindo o livro...</p>
</div>

<!-- Controles sempre visíveis -->
<div id="controls">
  <span id="counter">1 / 12</span>
  <div id="dots"></div>
</div>

<!-- Stage onde o livro é criado via JS -->
<div id="stage"></div>

<div id="hint">👆 clique nas laterais ou deslize para virar</div>
<div id="logo">
  <span>🌙</span>
  <span>Biblioteca<br>da Lua</span>
</div>

<script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.js"></script>
<script>
const SRCS = [
  'pascoa-da-lua/00_L.jpg','pascoa-da-lua/00_R.jpg',
  'pascoa-da-lua/01_L.jpg','pascoa-da-lua/01_R.jpg',
  'pascoa-da-lua/02_L.jpg','pascoa-da-lua/02_R.jpg',
  'pascoa-da-lua/03_L.jpg','pascoa-da-lua/03_R.jpg',
  'pascoa-da-lua/04_L.jpg','pascoa-da-lua/04_R.jpg',
  'pascoa-da-lua/05_L.jpg','pascoa-da-lua/05_R.jpg',
  'pascoa-da-lua/06_L.jpg','pascoa-da-lua/06_R.jpg',
  'pascoa-da-lua/07_L.jpg','pascoa-da-lua/07_R.jpg',
  'pascoa-da-lua/08_L.jpg','pascoa-da-lua/08_R.jpg',
  'pascoa-da-lua/09_L.jpg','pascoa-da-lua/09_R.jpg',
  'pascoa-da-lua/10_L.jpg','pascoa-da-lua/10_R.jpg',
  'pascoa-da-lua/11_L.jpg','pascoa-da-lua/11_R.jpg',
];
const TOTAL = 12;

let pf        = null;
let curSpread = 0;
let hintOn    = true;
let started   = false;

const stage     = document.getElementById('stage');
const controls  = document.getElementById('controls');
const dotsEl    = document.getElementById('dots');
const counterEl = document.getElementById('counter');
const hintEl    = document.getElementById('hint');

// Dots
for (let i = 0; i < TOTAL; i++) {
  const d = document.createElement('div');
  d.className = 'dot' + (i === 0 ? ' on' : '');
  d.onclick = () => { if (pf) pf.flip(i * 2); };
  dotsEl.appendChild(d);
}

function updateUI(idx) {
  curSpread = Math.floor(idx / 2);
  counterEl.textContent = `${curSpread + 1} / ${TOTAL}`;
  dotsEl.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('on', i === curSpread));
}

// ── Calcula dimensões ──
function getSize() {
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  const ctrlH = controls.getBoundingClientRect().height || 42;

  const availW = vw;
  const availH = vh - ctrlH;

  let sw = availW;
  let sh = Math.round(sw * 9 / 16);
  if (sh > availH) {
    sh = availH;
    sw = Math.round(sh * 16 / 9);
  }

  sw = Math.floor(sw / 2) * 2;
  sh = Math.floor(sh);

  return { pageW: sw / 2, pageH: sh, spreadW: sw };
}

// ── Cria tudo do zero (igual ao F5) ──
function build() {
  const prev = curSpread;

  // 1. Destrói instância anterior
  if (pf) { try { pf.destroy(); } catch(e){} pf = null; }

  // 2. Limpa o stage completamente
  stage.innerHTML = '';

  // 3. Calcula tamanho
  const { pageW, pageH, spreadW } = getSize();

  // 4. Ajusta altura do stage
  const ctrlH = controls.getBoundingClientRect().height || 42;
  stage.style.bottom = ctrlH + 'px';

  // 5. Cria o flip-book do zero
  const bookEl = document.createElement('div');
  bookEl.id = 'flip-book';
  bookEl.style.width  = spreadW + 'px';
  bookEl.style.height = pageH + 'px';

  // 6. Cria as páginas
  SRCS.forEach(src => {
    const page = document.createElement('div');
    page.className = 'page';
    page.style.width  = pageW + 'px';
    page.style.height = pageH + 'px';
    const img = document.createElement('img');
    img.src = src; img.alt = '';
    page.appendChild(img);
    bookEl.appendChild(page);
  });

  // 7. Cria a lombada
  const spine = document.createElement('div');
  spine.id = 'spine';
  spine.style.left = (spreadW / 2 - 3) + 'px';
  bookEl.appendChild(spine);

  stage.appendChild(bookEl);

  // 8. Inicia StPageFlip
  pf = new St.PageFlip(bookEl, {
    width:    pageW,
    height:   pageH,
    size:     'fixed',
    minWidth:  pageW,
    maxWidth:  pageW,
    minHeight: pageH,
    maxHeight: pageH,
    autoSize:            false,
    usePortrait:         false,
    drawShadow:          true,
    flippingTime:        700,
    maxShadowOpacity:    0.5,
    showCover:           false,
    mobileScrollSupport: false,
    useMouseEvents:      true,
    swipeDistance:       30,
    showPageCorners:     true,
    disableFlipByClick:  false,
    clickEventForward:   false,
    startZIndex:         0,
  });

  pf.loadFromHTML(bookEl.querySelectorAll('.page'));

  pf.on('flip', e => {
    updateUI(e.data);
    hideHint();
  });

  pf.on('init', () => {
    // Volta para a página correta após rebuild
    if (prev > 0) {
      setTimeout(() => { if (pf) pf.flip(prev * 2); }, 200);
    } else {
      updateUI(0);
    }
    if (!started) {
      started = true;
      document.getElementById('loader').classList.add('out');
    }
  });
}

function hideHint() {
  if (hintOn) { hintEl.classList.add('out'); hintOn = false; }
}
setTimeout(hideHint, 5000);

// Teclado
document.addEventListener('keydown', e => {
  if (!pf) return;
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { pf.flipNext(); hideHint(); }
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   { pf.flipPrev(); hideHint(); }
});

// ── Resize: rebuild completo igual ao F5 ──
let rsTimer = null;
function scheduleRebuild() {
  clearTimeout(rsTimer);
  rsTimer = setTimeout(build, 350);
}

window.addEventListener('resize', scheduleRebuild);
window.addEventListener('orientationchange', () => {
  clearTimeout(rsTimer);
  rsTimer = setTimeout(build, 600);
});
if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', scheduleRebuild);
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}

// ── Inicia ──
build();
</script>
</body>
</html>
