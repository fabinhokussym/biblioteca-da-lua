<!DOCTYPE html>
<!-- v8 -->
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Biblioteca da Lua">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#fdf6ee">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>A Páscoa da Lua — Biblioteca da Lua</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: #f5ece0;
  font-family: Georgia, serif;
  user-select: none;
  -webkit-user-select: none;
  touch-action: none;
}

/* Tudo centralizado neste stage */
#stage {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 0;
}

/* O canvas ocupa o espaço do livro */
#canvas {
  display: block;
  cursor: pointer;
  box-shadow: 0 4px 40px rgba(100,60,10,0.18), 0 2px 8px rgba(0,0,0,0.08);
}

/* Controles abaixo do canvas */
#controls {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  padding: 10px 0 0;
  width: 100%;
}

#dots {
  display: flex;
  gap: 6px;
  align-items: center;
}

.dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: rgba(150,90,30,0.22);
  border: 1px solid rgba(150,90,30,0.14);
  cursor: pointer;
  transition: all 0.2s;
}
.dot.on {
  background: #d4884a;
  transform: scale(1.45);
  border-color: #d4884a;
}

#counter {
  font-size: 11px;
  color: #a07040;
  letter-spacing: 1.5px;
  opacity: 0.65;
  min-width: 44px;
  text-align: center;
}

/* Logo */
#logo {
  position: fixed;
  bottom: 14px; left: 14px;
  z-index: 50;
  display: flex;
  align-items: center;
  gap: 5px;
  opacity: 0.45;
  pointer-events: none;
}
#logo span:first-child { font-size: 14px; }
#logo span:last-child {
  font-size: 8px;
  letter-spacing: 1.4px;
  color: #a06830;
  text-transform: uppercase;
  line-height: 1.3;
}

/* Hint */
#hint {
  position: fixed;
  bottom: 52px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(255,255,255,0.92);
  color: #a06830;
  font-size: 11px;
  padding: 5px 14px;
  border-radius: 20px;
  border: 1px solid rgba(160,100,40,0.15);
  z-index: 50;
  pointer-events: none;
  white-space: nowrap;
  transition: opacity 1.5s;
}
#hint.out { opacity: 0; }

/* Loader */
#loader {
  position: fixed;
  inset: 0;
  z-index: 999;
  background: #fdf6ee;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 18px;
  transition: opacity 0.9s;
}
#loader.out { opacity: 0; pointer-events: none; }

.moon-anim {
  font-size: 52px;
  animation: float 2s ease-in-out infinite;
}
@keyframes float {
  0%, 100% { transform: translateY(0) rotate(-8deg); }
  50%       { transform: translateY(-12px) rotate(8deg); }
}
#loader-title {
  font-size: 18px;
  color: #c07838;
  letter-spacing: 2.5px;
  font-style: italic;
  opacity: 0.85;
}
#loader-sub {
  font-size: 11px;
  color: #c09060;
  letter-spacing: 2px;
  opacity: 0.5;
}
</style>
</head>
<body>

<div id="loader">
  <div class="moon-anim">🌙</div>
  <p id="loader-title">Biblioteca da Lua</p>
  <p id="loader-sub">Abrindo o livro...</p>
</div>

<div id="stage">
  <canvas id="canvas"></canvas>
  <div id="controls">
    <span id="counter">1 / 12</span>
    <div id="dots"></div>
  </div>
</div>

<div id="logo">
  <span>🌙</span>
  <span>Biblioteca<br>da Lua</span>
</div>

<div id="hint">👆 clique nas laterais ou deslize para virar a página</div>

<script>
// ═══════════════════════════════════════════
// CONFIGURAÇÃO
// ═══════════════════════════════════════════
const SPREADS = [
  ['pascoa-da-lua/00_L.jpg', 'pascoa-da-lua/00_R.jpg'],
  ['pascoa-da-lua/01_L.jpg', 'pascoa-da-lua/01_R.jpg'],
  ['pascoa-da-lua/02_L.jpg', 'pascoa-da-lua/02_R.jpg'],
  ['pascoa-da-lua/03_L.jpg', 'pascoa-da-lua/03_R.jpg'],
  ['pascoa-da-lua/04_L.jpg', 'pascoa-da-lua/04_R.jpg'],
  ['pascoa-da-lua/05_L.jpg', 'pascoa-da-lua/05_R.jpg'],
  ['pascoa-da-lua/06_L.jpg', 'pascoa-da-lua/06_R.jpg'],
  ['pascoa-da-lua/07_L.jpg', 'pascoa-da-lua/07_R.jpg'],
  ['pascoa-da-lua/08_L.jpg', 'pascoa-da-lua/08_R.jpg'],
  ['pascoa-da-lua/09_L.jpg', 'pascoa-da-lua/09_R.jpg'],
  ['pascoa-da-lua/10_L.jpg', 'pascoa-da-lua/10_R.jpg'],
  ['pascoa-da-lua/11_L.jpg', 'pascoa-da-lua/11_R.jpg'],
];
const TOTAL    = SPREADS.length;
const FLIP_MS  = 650;

// ═══════════════════════════════════════════
// PRÉ-CARREGA TODAS AS IMAGENS
// ═══════════════════════════════════════════
// Cada entrada: [imgL, imgR]
const loaded = [];
let loadCount = 0;
const totalImgs = TOTAL * 2;

function preloadAll(onDone) {
  SPREADS.forEach((pair, si) => {
    loaded[si] = [null, null];
    pair.forEach((src, pi) => {
      const img = new Image();
      img.onload = img.onerror = () => {
        loaded[si][pi] = img;
        loadCount++;
        if (loadCount >= totalImgs) onDone();
      };
      img.src = src;
    });
  });
  // Fallback: 8s
  setTimeout(onDone, 8000);
}

// ═══════════════════════════════════════════
// ESTADO
// ═══════════════════════════════════════════
let cur      = 0;
let flipping = false;
let hintOn   = true;
let CW = 0, CH = 0;  // largura e altura do canvas (= spread completo)

const canvas    = document.getElementById('canvas');
const ctx       = canvas.getContext('2d');
const dotsEl    = document.getElementById('dots');
const counterEl = document.getElementById('counter');
const hintEl    = document.getElementById('hint');

// ═══════════════════════════════════════════
// DOTS
// ═══════════════════════════════════════════
for (let i = 0; i < TOTAL; i++) {
  const d = document.createElement('div');
  d.className = 'dot' + (i === 0 ? ' on' : '');
  d.onclick = () => { if (!flipping && i !== cur) startFlip(i > cur ? 1 : -1); };
  dotsEl.appendChild(d);
}

function updateUI() {
  counterEl.textContent = `${cur + 1} / ${TOTAL}`;
  dotsEl.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('on', i === cur));
}

// ═══════════════════════════════════════════
// TAMANHO — recalcula a cada resize
// ═══════════════════════════════════════════
function resize() {
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  // Reserva espaço para controles (~44px) e margem mínima (~8px)
  const maxW = vw;
  const maxH = vh - 52;

  // Proporção 16:9 do spread completo
  let w = maxW;
  let h = Math.round(w * 9 / 16);
  if (h > maxH) {
    h = maxH;
    w = Math.round(h * 16 / 9);
  }

  CW = Math.floor(w);
  CH = Math.floor(h);

  canvas.width  = CW;
  canvas.height = CH;
  canvas.style.width  = CW + 'px';
  canvas.style.height = CH + 'px';
}

// ═══════════════════════════════════════════
// DESENHA SPREAD ESTÁTICO
// ═══════════════════════════════════════════
function drawSpread(si) {
  const hw = Math.floor(CW / 2);
  const [imgL, imgR] = loaded[si] || [null, null];

  ctx.clearRect(0, 0, CW, CH);

  if (imgL && imgL.naturalWidth) ctx.drawImage(imgL, 0,  0, hw, CH);
  if (imgR && imgR.naturalWidth) ctx.drawImage(imgR, hw, 0, hw, CH);

  // Lombada
  const sg = ctx.createLinearGradient(hw - 3, 0, hw + 3, 0);
  sg.addColorStop(0,   'rgba(60,30,0,0)');
  sg.addColorStop(0.4, 'rgba(60,30,0,0.18)');
  sg.addColorStop(0.5, 'rgba(60,30,0,0.35)');
  sg.addColorStop(0.6, 'rgba(60,30,0,0.18)');
  sg.addColorStop(1,   'rgba(60,30,0,0)');
  ctx.fillStyle = sg;
  ctx.fillRect(hw - 3, 0, 6, CH);
}

// ═══════════════════════════════════════════
// ANIMAÇÃO DE FLIP — canvas puro
//
// AVANÇAR (fwd): a metade DIREITA do spread
//   atual "vira" para a esquerda, revelando
//   a metade ESQUERDA do próximo spread.
//   Depois mostra o spread completo seguinte.
//
// VOLTAR (bwd): a metade ESQUERDA do spread
//   atual "vira" para a direita, revelando
//   a metade DIREITA do spread anterior.
//
// Técnica: compressão horizontal com cos(ângulo)
//   - t: 0→1 (progresso da animação)
//   - angle: 0→π
//   - cos(angle): 1→0→-1
//   - abs(cos): compressa a folha virando
//   - sin(angle): sombra (máxima no meio)
// ═══════════════════════════════════════════
function startFlip(dir) {
  if (flipping) return;
  const next = cur + dir;
  if (next < 0 || next >= TOTAL) return;

  flipping = true;
  hideHint();

  const fwd   = dir > 0;
  const hw    = Math.floor(CW / 2);
  const from  = cur;
  const to    = next;
  const t0    = performance.now();

  // Ease in-out quart
  const ease = x => x < 0.5 ? 8 * x ** 4 : 1 - (-2 * x + 2) ** 4 / 2;

  function frame(now) {
    const raw = Math.min((now - t0) / FLIP_MS, 1);
    const t   = ease(raw);
    const ang = t * Math.PI;
    const cosA = Math.cos(ang);
    const sinA = Math.sin(ang);  // para sombra
    const absC = Math.abs(cosA);

    ctx.clearRect(0, 0, CW, CH);

    if (fwd) {
      // ── AVANÇAR ──
      // Base: spread destino completo embaixo
      const [dL, dR] = loaded[to];
      if (dL && dL.naturalWidth) ctx.drawImage(dL, 0,  0, hw, CH);
      if (dR && dR.naturalWidth) ctx.drawImage(dR, hw, 0, hw, CH);

      // Metade esquerda do spread atual (estática)
      const [fL] = loaded[from];
      if (fL && fL.naturalWidth) {
        ctx.save();
        ctx.beginPath(); ctx.rect(0, 0, hw, CH); ctx.clip();
        ctx.drawImage(fL, 0, 0, hw, CH);
        ctx.restore();
      }

      // Folha virando (metade direita do from, virando para a esquerda)
      const [, fR] = loaded[from];
      const foldW = hw * absC; // largura visível da folha

      if (foldW > 0.5) {
        ctx.save();
        ctx.beginPath(); ctx.rect(hw - foldW, 0, foldW, CH); ctx.clip();

        if (cosA >= 0) {
          // Primeira metade (0→π/2): frente da folha (fR) comprimindo
          ctx.drawImage(fR, hw - foldW, 0, foldW, CH);
        } else {
          // Segunda metade (π/2→π): verso da folha (dL) expandindo
          if (dL && dL.naturalWidth)
            ctx.drawImage(dL, hw - foldW, 0, foldW, CH);
        }

        // Sombra na borda da dobra
        const grd = ctx.createLinearGradient(hw - foldW, 0, hw - foldW + Math.min(foldW * 0.4, 30), 0);
        grd.addColorStop(0, `rgba(0,0,0,${0.45 * sinA})`);
        grd.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = grd;
        ctx.fillRect(hw - foldW, 0, Math.min(foldW * 0.4, 30), CH);

        ctx.restore();
      }

      // Sombra projetada sobre a metade esquerda
      if (sinA > 0.01) {
        const sh = ctx.createLinearGradient(hw, 0, Math.max(hw - 60, 0), 0);
        sh.addColorStop(0, `rgba(0,0,0,${0.22 * sinA})`);
        sh.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = sh;
        ctx.fillRect(Math.max(hw - 60, 0), 0, 60, CH);
      }

    } else {
      // ── VOLTAR ──
      // Base: spread destino completo embaixo
      const [dL, dR] = loaded[to];
      if (dL && dL.naturalWidth) ctx.drawImage(dL, 0,  0, hw, CH);
      if (dR && dR.naturalWidth) ctx.drawImage(dR, hw, 0, hw, CH);

      // Metade direita do spread atual (estática)
      const [, fR] = loaded[from];
      if (fR && fR.naturalWidth) {
        ctx.save();
        ctx.beginPath(); ctx.rect(hw, 0, hw, CH); ctx.clip();
        ctx.drawImage(fR, hw, 0, hw, CH);
        ctx.restore();
      }

      // Folha virando (metade esquerda do from, virando para a direita)
      const [fL] = loaded[from];
      const foldW = hw * absC;

      if (foldW > 0.5) {
        ctx.save();
        ctx.beginPath(); ctx.rect(hw, 0, foldW, CH); ctx.clip();

        if (cosA >= 0) {
          // Frente: fL comprimindo
          ctx.drawImage(fL, hw, 0, foldW, CH);
        } else {
          // Verso: dR expandindo
          if (dR && dR.naturalWidth)
            ctx.drawImage(dR, hw, 0, foldW, CH);
        }

        // Sombra na borda da dobra
        const grd = ctx.createLinearGradient(hw + foldW, 0, hw + foldW - Math.min(foldW * 0.4, 30), 0);
        grd.addColorStop(0, `rgba(0,0,0,${0.45 * sinA})`);
        grd.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = grd;
        ctx.fillRect(hw + foldW - Math.min(foldW * 0.4, 30), 0, Math.min(foldW * 0.4, 30), CH);

        ctx.restore();
      }

      // Sombra projetada sobre a metade direita
      if (sinA > 0.01) {
        const sh = ctx.createLinearGradient(hw, 0, Math.min(hw + 60, CW), 0);
        sh.addColorStop(0, `rgba(0,0,0,${0.22 * sinA})`);
        sh.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = sh;
        ctx.fillRect(hw, 0, 60, CH);
      }
    }

    // Lombada sempre por cima
    drawSpine();

    if (raw < 1) {
      requestAnimationFrame(frame);
    } else {
      cur = next;
      drawSpread(cur);
      updateUI();
      flipping = false;
    }
  }

  requestAnimationFrame(frame);
}

function drawSpine() {
  const hw = Math.floor(CW / 2);
  const sg = ctx.createLinearGradient(hw - 3, 0, hw + 3, 0);
  sg.addColorStop(0,   'rgba(60,30,0,0)');
  sg.addColorStop(0.4, 'rgba(60,30,0,0.18)');
  sg.addColorStop(0.5, 'rgba(60,30,0,0.35)');
  sg.addColorStop(0.6, 'rgba(60,30,0,0.18)');
  sg.addColorStop(1,   'rgba(60,30,0,0)');
  ctx.fillStyle = sg;
  ctx.fillRect(hw - 3, 0, 6, CH);
}

// ═══════════════════════════════════════════
// CONTROLES
// ═══════════════════════════════════════════
canvas.addEventListener('click', e => {
  const x = e.offsetX;
  if (x > CW * 0.65) startFlip(1);
  else if (x < CW * 0.35) startFlip(-1);
});

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') startFlip(1);
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   startFlip(-1);
});

let tx0 = 0, ty0 = 0, tt0 = 0;
document.addEventListener('touchstart', e => {
  tx0 = e.touches[0].clientX;
  ty0 = e.touches[0].clientY;
  tt0 = Date.now();
}, { passive: true });

document.addEventListener('touchend', e => {
  if (flipping) return;
  const dx = e.changedTouches[0].clientX - tx0;
  const dy = e.changedTouches[0].clientY - ty0;
  if (Math.abs(dx) > 40 && Math.abs(dx) > Math.abs(dy) && Date.now() - tt0 < 500)
    startFlip(dx < 0 ? 1 : -1);
}, { passive: true });

function hideHint() {
  if (hintOn) { hintEl.classList.add('out'); hintOn = false; }
}
setTimeout(hideHint, 5000);

// ═══════════════════════════════════════════
// RESIZE / ORIENTAÇÃO
// ═══════════════════════════════════════════
let rsTimer;
function onResize() {
  clearTimeout(rsTimer);
  rsTimer = setTimeout(() => {
    resize();
    drawSpread(cur);
  }, 200);
}
window.addEventListener('resize', onResize);
window.addEventListener('orientationchange', () => setTimeout(onResize, 450));
if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', onResize);
}

// ═══════════════════════════════════════════
// SERVICE WORKER
// ═══════════════════════════════════════════
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}

// ═══════════════════════════════════════════
// INICIA
// ═══════════════════════════════════════════
resize();

preloadAll(() => {
  drawSpread(0);
  updateUI();
  document.getElementById('loader').classList.add('out');
});
</script>
</body>
</html>
