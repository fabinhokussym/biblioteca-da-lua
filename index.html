<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Biblioteca da Lua">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#fdf6ee">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>A Páscoa da Lua — Biblioteca da Lua</title>
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

html, body {
  width:100%; height:100%;
  overflow:hidden;
  font-family: Georgia, serif;
  user-select:none; -webkit-user-select:none;
  touch-action:none;
}

/* Fundo sempre visível */
body { background: linear-gradient(160deg, #fdf8f0 0%, #f5e8d8 50%, #fdf4e8 100%); }

/* Topbar — só desktop */
#topbar {
  position:fixed; top:0; left:0; right:0; z-index:50;
  display:flex; align-items:center; justify-content:center;
  padding:12px 0 0; pointer-events:none;
}
#topbar h1 {
  font-size:12px; font-weight:normal; letter-spacing:2.5px;
  color:#a06830; text-transform:uppercase; opacity:0.6;
}

/* Stage — ocupa tudo e centraliza o livro */
#stage {
  position:fixed;
  top:0; left:0; right:0; bottom:0;
  display:flex; align-items:center; justify-content:center;
  z-index:10;
}

/* Wrapper — tamanho definido via JS */
#book-wrapper {
  position:relative;
  flex-shrink:0;
}
#book-wrapper::after {
  content:'';
  position:absolute;
  bottom:-14px; left:5%; right:5%; height:16px;
  background: radial-gradient(ellipse at 50% 0%, rgba(90,50,10,0.14) 0%, transparent 70%);
  pointer-events:none;
}

/* Container do StPageFlip */
#book-container {
  position:relative;
  overflow:hidden;
  border-radius:2px 6px 6px 2px;
  box-shadow:
    0 2px 6px rgba(0,0,0,0.06),
    0 8px 36px rgba(100,60,10,0.14);
}

/* Páginas HTML */
.page {
  overflow:hidden;
  background:#f8f0e0;
}
.page img {
  width:100%; height:100%;
  object-fit:cover; display:block;
  pointer-events:none;
}

/* Botões laterais */
.nav-btn {
  position:fixed; top:50%; transform:translateY(-50%);
  width:44px; height:44px; border-radius:50%;
  background:rgba(255,255,255,0.92);
  border:1px solid rgba(160,100,40,0.2);
  display:flex; align-items:center; justify-content:center;
  font-size:24px; color:#b07030; cursor:pointer; z-index:60;
  box-shadow:0 2px 12px rgba(120,70,10,0.12);
  transition:opacity 0.2s, transform 0.15s;
  line-height:1;
}
.nav-btn:hover { transform:translateY(-50%) scale(1.08); }
.nav-btn:active { transform:translateY(-50%) scale(0.93); }
.nav-btn.off { opacity:0 !important; pointer-events:none; }
#btnPrev { left:12px; }
#btnNext { right:12px; }

/* Controles inferiores */
#controls {
  position:fixed; bottom:0; left:0; right:0; z-index:60;
  display:flex; align-items:center; justify-content:center;
  gap:18px; padding:9px 20px 13px;
}
#dots { display:flex; gap:6px; align-items:center; }
.dot {
  width:7px; height:7px; border-radius:50%;
  background:rgba(150,90,30,0.2); cursor:pointer;
  border:1px solid rgba(150,90,30,0.12); transition:all 0.2s;
}
.dot.on { background:#d4884a; transform:scale(1.4); border-color:#d4884a; }
#counter {
  font-size:11px; color:#a07040; letter-spacing:1.8px;
  opacity:0.6; min-width:44px; text-align:center;
}

/* Logo */
#logo {
  position:fixed; bottom:14px; left:14px; z-index:60;
  display:flex; align-items:center; gap:5px;
  opacity:0.45; pointer-events:none;
}
#logo-moon { font-size:14px; line-height:1; }
#logo-text {
  font-size:9px; letter-spacing:1.4px; color:#a06830;
  text-transform:uppercase; line-height:1.35;
}

/* Hint */
#hint {
  position:fixed; bottom:44px; left:50%; transform:translateX(-50%);
  background:rgba(255,255,255,0.92); color:#a06830;
  font-size:11px; padding:5px 13px; border-radius:20px;
  border:1px solid rgba(160,100,40,0.15);
  z-index:60; pointer-events:none; white-space:nowrap;
  transition:opacity 1.5s;
}
#hint.out { opacity:0; }

/* Loader */
#loader {
  position:fixed; inset:0; z-index:999;
  background:#fdf6ee;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:18px;
  transition:opacity 0.9s;
}
#loader.out { opacity:0; pointer-events:none; }
.moon-anim { font-size:52px; animation:float 2s ease-in-out infinite; }
@keyframes float {
  0%,100%{ transform:translateY(0) rotate(-8deg); }
  50%{ transform:translateY(-11px) rotate(8deg); }
}
#loader-title { font-size:18px; color:#c07838; letter-spacing:2.5px; font-style:italic; opacity:0.85; }
#loader-sub { font-size:11px; color:#c09060; letter-spacing:2px; opacity:0.5; }
</style>
</head>
<body>

<div id="loader">
  <div class="moon-anim">🌙</div>
  <p id="loader-title">Biblioteca da Lua</p>
  <p id="loader-sub">Abrindo o livro...</p>
</div>

<div id="topbar"><h1>A Páscoa da Lua</h1></div>

<div id="stage">
  <div id="book-wrapper">
    <div id="book-container">
      <div class="page"><img src="pascoa-da-lua/00_L.jpg" alt=""></div>
      <div class="page"><img src="pascoa-da-lua/00_R.jpg" alt=""></div>
      <div class="page"><img src="pascoa-da-lua/01_L.jpg" alt=""></div>
      <div class="page"><img src="pascoa-da-lua/01_R.jpg" alt=""></div>
      <div class="page"><img src="pascoa-da-lua/02_L.jpg" alt=""></div>
      <div class="page"><img src="pascoa-da-lua/02_R.jpg" alt=""></div>
      <div class="page"><img src="pascoa-da-lua/03_L.jpg" alt=""></div>
      <div class="page"><img src="pascoa-da-lua/03_R.jpg" alt=""></div>
      <div class="page"><img src="pascoa-da-lua/04_L.jpg" alt=""></div>
      <div class="page"><img src="pascoa-da-lua/04_R.jpg" alt=""></div>
      <div class="page"><img src="pascoa-da-lua/05_L.jpg" alt=""></div>
      <div class="page"><img src="pascoa-da-lua/05_R.jpg" alt=""></div>
      <div class="page"><img src="pascoa-da-lua/06_L.jpg" alt=""></div>
      <div class="page"><img src="pascoa-da-lua/06_R.jpg" alt=""></div>
      <div class="page"><img src="pascoa-da-lua/07_L.jpg" alt=""></div>
      <div class="page"><img src="pascoa-da-lua/07_R.jpg" alt=""></div>
      <div class="page"><img src="pascoa-da-lua/08_L.jpg" alt=""></div>
      <div class="page"><img src="pascoa-da-lua/08_R.jpg" alt=""></div>
      <div class="page"><img src="pascoa-da-lua/09_L.jpg" alt=""></div>
      <div class="page"><img src="pascoa-da-lua/09_R.jpg" alt=""></div>
      <div class="page"><img src="pascoa-da-lua/10_L.jpg" alt=""></div>
      <div class="page"><img src="pascoa-da-lua/10_R.jpg" alt=""></div>
      <div class="page"><img src="pascoa-da-lua/11_L.jpg" alt=""></div>
      <div class="page"><img src="pascoa-da-lua/11_R.jpg" alt=""></div>
    </div>
  </div>
</div>

<button class="nav-btn off" id="btnPrev">&#8249;</button>
<button class="nav-btn" id="btnNext">&#8250;</button>

<div id="hint">👆 clique nas laterais para virar a página</div>
<div id="controls">
  <span id="counter">1 / 12</span>
  <div id="dots"></div>
</div>
<div id="logo">
  <span id="logo-moon">🌙</span>
  <span id="logo-text">Biblioteca<br>da Lua</span>
</div>

<!-- Cache bust: v4 -->
<script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.js"></script>
<script>
const TOTAL_SPREADS = 12;
let pageFlip  = null;
let curSpread = 0;
let hintOn    = true;
let initialized = false;

const wrapper   = document.getElementById('book-wrapper');
const container = document.getElementById('book-container');
const dotsEl    = document.getElementById('dots');
const counterEl = document.getElementById('counter');
const btnPrev   = document.getElementById('btnPrev');
const btnNext   = document.getElementById('btnNext');
const hintEl    = document.getElementById('hint');
const topbar    = document.getElementById('topbar');
const stage     = document.getElementById('stage');

// Dots
for (let i = 0; i < TOTAL_SPREADS; i++) {
  const d = document.createElement('div');
  d.className = 'dot' + (i===0?' on':'');
  d.onclick = () => { if(pageFlip) pageFlip.flip(i * 2); };
  dotsEl.appendChild(d);
}

function updateUI(pageIndex) {
  curSpread = Math.floor(pageIndex / 2);
  counterEl.textContent = `${curSpread + 1} / ${TOTAL_SPREADS}`;
  dotsEl.querySelectorAll('.dot').forEach((d,i) => d.classList.toggle('on', i===curSpread));
  btnPrev.classList.toggle('off', curSpread===0);
  btnNext.classList.toggle('off', curSpread===TOTAL_SPREADS-1);
}

// ── Calcula dimensões ──
// O spread completo (L+R) = proporção 16:9 das imagens originais
// Cada page = metade do spread
function calcSize() {
  // Usa innerWidth/innerHeight que já considera orientation
  const vw = window.innerWidth;
  const vh = window.innerHeight;

  // Espaço disponível: deixa margem para controles
  const controlsH = 42; // altura dos controles inferiores
  const topH = 32;      // altura do topbar

  const availW = vw;
  const availH = vh - controlsH - topH;

  // O spread tem proporção 16:9 (imagem original completa)
  let spreadW = availW;
  let spreadH = Math.round(spreadW * 9 / 16);

  if (spreadH > availH) {
    spreadH = availH;
    spreadW = Math.round(spreadH * 16 / 9);
  }

  // Garante que não ultrapassa
  spreadW = Math.min(spreadW, availW);
  spreadH = Math.min(spreadH, availH);

  const pageW = Math.floor(spreadW / 2);
  const pageH = Math.floor(spreadH);

  return { pageW, pageH, spreadW: pageW * 2, spreadH: pageH };
}

function applyMobileStyle() {
  const isMob = window.innerWidth <= 768 || window.innerHeight <= 500;
  if (isMob) {
    document.body.style.background = '#111';
    stage.style.background = '#111';
    topbar.style.display = 'none';
    document.getElementById('controls').style.background = 'rgba(0,0,0,0.55)';
    document.querySelectorAll('.dot').forEach(d => {
      d.style.background = d.classList.contains('on') ? '#f4a835' : 'rgba(255,255,255,0.2)';
      d.style.borderColor = d.classList.contains('on') ? '#f4a835' : 'rgba(255,255,255,0.08)';
    });
    counterEl.style.color = 'rgba(255,255,255,0.4)';
    btnPrev.style.background = 'rgba(255,255,255,0.12)';
    btnNext.style.background = 'rgba(255,255,255,0.12)';
    btnPrev.style.color = '#fff';
    btnNext.style.color = '#fff';
    btnPrev.style.borderColor = 'rgba(255,255,255,0.15)';
    btnNext.style.borderColor = 'rgba(255,255,255,0.15)';
    document.getElementById('logo').style.color = 'rgba(255,255,255,0.38)';
    document.getElementById('logo-text').style.color = 'rgba(255,255,255,0.38)';
    hintEl.style.background = 'rgba(0,0,0,0.55)';
    hintEl.style.color = 'rgba(255,255,255,0.6)';
    hintEl.style.borderColor = 'rgba(255,255,255,0.08)';
    container.style.borderRadius = '0';
    container.style.boxShadow = 'none';
    wrapper.style.setProperty('--after-display', 'none');
    wrapper.querySelector && (wrapper.style.cssText += ';--hide-after:1');
  } else {
    document.body.style.background = '';
    stage.style.background = '';
    topbar.style.display = '';
    document.getElementById('controls').style.background = '';
    counterEl.style.color = '';
    btnPrev.style.cssText = '';
    btnNext.style.cssText = '';
    document.getElementById('logo-text').style.color = '';
    hintEl.style.cssText = '';
    container.style.borderRadius = '2px 6px 6px 2px';
    container.style.boxShadow = '0 2px 6px rgba(0,0,0,0.06),0 8px 36px rgba(100,60,10,0.14)';
  }
}

function rebuild() {
  // Remove instância anterior
  if (pageFlip) {
    try { pageFlip.destroy(); } catch(e){}
    pageFlip = null;
  }

  // Recria divs das páginas (a biblioteca modifica o DOM)
  container.innerHTML = '';
  const srcs = [
    'pascoa-da-lua/00_L.jpg','pascoa-da-lua/00_R.jpg',
    'pascoa-da-lua/01_L.jpg','pascoa-da-lua/01_R.jpg',
    'pascoa-da-lua/02_L.jpg','pascoa-da-lua/02_R.jpg',
    'pascoa-da-lua/03_L.jpg','pascoa-da-lua/03_R.jpg',
    'pascoa-da-lua/04_L.jpg','pascoa-da-lua/04_R.jpg',
    'pascoa-da-lua/05_L.jpg','pascoa-da-lua/05_R.jpg',
    'pascoa-da-lua/06_L.jpg','pascoa-da-lua/06_R.jpg',
    'pascoa-da-lua/07_L.jpg','pascoa-da-lua/07_R.jpg',
    'pascoa-da-lua/08_L.jpg','pascoa-da-lua/08_R.jpg',
    'pascoa-da-lua/09_L.jpg','pascoa-da-lua/09_R.jpg',
    'pascoa-da-lua/10_L.jpg','pascoa-da-lua/10_R.jpg',
    'pascoa-da-lua/11_L.jpg','pascoa-da-lua/11_R.jpg',
  ];
  srcs.forEach(src => {
    const div = document.createElement('div');
    div.className = 'page';
    const img = document.createElement('img');
    img.src = src; img.alt = '';
    div.appendChild(img);
    container.appendChild(div);
  });

  const { pageW, pageH, spreadW, spreadH } = calcSize();

  // ★ Define tamanho explícito no wrapper e container
  wrapper.style.width  = spreadW + 'px';
  wrapper.style.height = spreadH + 'px';
  container.style.width  = spreadW + 'px';
  container.style.height = spreadH + 'px';

  // Define tamanho em cada .page
  document.querySelectorAll('.page').forEach(p => {
    p.style.width  = pageW + 'px';
    p.style.height = pageH + 'px';
  });

  applyMobileStyle();

  pageFlip = new St.PageFlip(container, {
    width:    pageW,
    height:   pageH,
    size:    'fixed',
    minWidth: pageW,
    maxWidth: pageW,
    minHeight: pageH,
    maxHeight: pageH,
    drawShadow:          true,
    flippingTime:        750,
    usePortrait:         false,
    startZIndex:         0,
    autoSize:            false,
    maxShadowOpacity:    0.6,
    showCover:           false,
    mobileScrollSupport: false,
    clickEventForward:   false,
    useMouseEvents:      true,
    swipeDistance:       30,
    showPageCorners:     true,
    disableFlipByClick:  false,
  });

  pageFlip.loadFromHTML(document.querySelectorAll('.page'));

  pageFlip.on('flip', (e) => {
    updateUI(e.data);
    hideHint();
  });

  pageFlip.on('init', () => {
    if (!initialized) {
      initialized = true;
      setTimeout(() => document.getElementById('loader').classList.add('out'), 400);
    }
    updateUI(curSpread * 2 > 0 ? curSpread * 2 : 0);
  });
}

// Botões
btnPrev.onclick = () => { if(pageFlip) { pageFlip.flipPrev(); hideHint(); } };
btnNext.onclick = () => { if(pageFlip) { pageFlip.flipNext(); hideHint(); } };

document.addEventListener('keydown', e => {
  if (!pageFlip) return;
  if (e.key==='ArrowRight'||e.key==='ArrowDown') { pageFlip.flipNext(); hideHint(); }
  if (e.key==='ArrowLeft' ||e.key==='ArrowUp')   { pageFlip.flipPrev(); hideHint(); }
});

function hideHint() {
  if (hintOn) { hintEl.classList.add('out'); hintOn=false; }
}
setTimeout(hideHint, 5000);

// ★ Resize e orientação — reconstrói o livro
let rsTimer;
function onResize() {
  clearTimeout(rsTimer);
  rsTimer = setTimeout(() => {
    const s = curSpread;
    rebuild();
    // Volta para a página correta após rebuild
    setTimeout(() => {
      if (pageFlip && s > 0) pageFlip.flip(s * 2);
    }, 200);
  }, 250);
}

window.addEventListener('resize', onResize);
// ★ Escuta mudança de orientação explicitamente
window.addEventListener('orientationchange', () => {
  // Espera a orientação completar antes de recalcular
  setTimeout(onResize, 400);
});

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}

// Inicia
rebuild();
</script>
</body>
</html>
