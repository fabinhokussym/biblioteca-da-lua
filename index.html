<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Biblioteca da Lua">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#fdf6ee">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>A Páscoa da Lua — Biblioteca da Lua</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }

html, body {
  width:100%; height:100%; overflow:hidden;
  font-family: Georgia, serif;
  user-select:none; -webkit-user-select:none;
  touch-action:none;
  background: linear-gradient(160deg, #fdf8f0 0%, #f5e8d8 50%, #fdf4e8 100%);
}

#topbar {
  position:fixed; top:0; left:0; right:0; z-index:50;
  display:flex; align-items:center; justify-content:center;
  padding:13px 0 0; pointer-events:none;
}
#topbar h1 {
  font-size:12px; font-weight:normal; letter-spacing:2.5px;
  color:#a06830; text-transform:uppercase; opacity:0.6;
}

#stage {
  position:fixed; inset:0; z-index:10;
  display:flex; align-items:center; justify-content:center;
}

#book-wrapper {
  position:relative;
  display:flex; align-items:center; justify-content:center;
}
#book-wrapper::after {
  content:'';
  position:absolute;
  bottom:-18px; left:4%; right:4%; height:20px;
  background: radial-gradient(ellipse at 50% 0%, rgba(90,50,10,0.16) 0%, transparent 70%);
  pointer-events:none;
}

/* Páginas HTML para o StPageFlip */
.page {
  background: #fff;
  overflow: hidden;
}
.page img {
  width:100%; height:100%;
  object-fit:cover; display:block;
  pointer-events:none;
}

/* StPageFlip container */
#book-container { position:relative; }
#book-container canvas {
  border-radius:3px 8px 8px 3px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.07), 0 8px 40px rgba(100,60,10,0.14);
  display:block;
}

.nav-btn {
  position:fixed; top:50%; transform:translateY(-50%);
  width:46px; height:46px; border-radius:50%;
  background:rgba(255,255,255,0.92);
  border:1px solid rgba(160,100,40,0.2);
  display:flex; align-items:center; justify-content:center;
  font-size:26px; color:#b07030; cursor:pointer; z-index:50;
  box-shadow:0 2px 14px rgba(120,70,10,0.12);
  transition:opacity 0.2s, transform 0.15s;
  line-height:1;
}
.nav-btn:hover { transform:translateY(-50%) scale(1.07); }
.nav-btn:active { transform:translateY(-50%) scale(0.94); }
.nav-btn.off { opacity:0; pointer-events:none; }
#btnPrev { left:14px; }
#btnNext { right:14px; }

#controls {
  position:fixed; bottom:0; left:0; right:0; z-index:50;
  display:flex; align-items:center; justify-content:center;
  gap:20px; padding:10px 20px 14px;
}
#dots { display:flex; gap:7px; align-items:center; }
.dot {
  width:7px; height:7px; border-radius:50%;
  background:rgba(150,90,30,0.18); cursor:pointer;
  border:1px solid rgba(150,90,30,0.12); transition:all 0.22s;
}
.dot.on { background:#d4884a; transform:scale(1.45); border-color:#d4884a; }
#counter { font-size:11px; color:#a07040; letter-spacing:1.8px; opacity:0.6; min-width:46px; text-align:center; }

#logo {
  position:fixed; bottom:15px; left:16px; z-index:100;
  display:flex; align-items:center; gap:5px; opacity:0.48; pointer-events:none;
}
#logo-moon { font-size:15px; line-height:1; }
#logo-text { font-size:9px; letter-spacing:1.5px; color:#a06830; text-transform:uppercase; line-height:1.35; }

#hint {
  position:fixed; bottom:46px; left:50%; transform:translateX(-50%);
  background:rgba(255,255,255,0.9); color:#a06830;
  font-size:11px; padding:5px 14px; border-radius:20px;
  border:1px solid rgba(160,100,40,0.15);
  z-index:50; pointer-events:none; white-space:nowrap;
  transition:opacity 1.5s;
}
#hint.out { opacity:0; }

#loader {
  position:fixed; inset:0; z-index:999;
  background:#fdf6ee;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:18px;
  transition:opacity 0.9s;
}
#loader.out { opacity:0; pointer-events:none; }
.moon-anim { font-size:54px; animation:float 2s ease-in-out infinite; }
@keyframes float {
  0%,100%{ transform:translateY(0) rotate(-8deg); }
  50%{ transform:translateY(-12px) rotate(8deg); }
}
#loader-title { font-size:18px; color:#c07838; letter-spacing:2.5px; font-style:italic; opacity:0.85; }
#loader-sub { font-size:11px; color:#c09060; letter-spacing:2px; opacity:0.5; }

@media (max-width:768px) {
  html,body { background:#111; }
  #topbar { display:none; }
  #stage { background:#111; }
  #book-wrapper::after { display:none; }
  #book-container canvas { border-radius:0; box-shadow:none; }
  #controls { background:rgba(0,0,0,0.55); backdrop-filter:blur(4px); padding:7px 16px 10px; }
  .dot { background:rgba(255,255,255,0.2); border-color:rgba(255,255,255,0.08); }
  .dot.on { background:#f4a835; border-color:#f4a835; }
  #counter { color:rgba(255,255,255,0.4); }
  .nav-btn { background:rgba(255,255,255,0.12); border-color:rgba(255,255,255,0.15); color:#fff; box-shadow:none; }
  #logo { bottom:46px; }
  #logo-moon { font-size:13px; }
  #logo-text { color:rgba(255,255,255,0.38); }
  #hint { background:rgba(0,0,0,0.55); color:rgba(255,255,255,0.6); border-color:rgba(255,255,255,0.08); bottom:48px; }
  #loader { background:#0d0700; }
  #loader-title { color:#e89040; }
}
</style>
</head>
<body>

<div id="loader">
  <div class="moon-anim">🌙</div>
  <p id="loader-title">Biblioteca da Lua</p>
  <p id="loader-sub">Abrindo o livro...</p>
</div>

<div id="topbar"><h1>A Páscoa da Lua</h1></div>

<div id="stage">
  <div id="book-wrapper">
    <!-- Páginas HTML — o StPageFlip usa HTML em vez de canvas -->
    <div id="book-container">
      <div class="page"><img src="pascoa-da-lua/00_L.jpg" alt=""></div>
      <div class="page"><img src="pascoa-da-lua/00_R.jpg" alt=""></div>
      <div class="page"><img src="pascoa-da-lua/01_L.jpg" alt=""></div>
      <div class="page"><img src="pascoa-da-lua/01_R.jpg" alt=""></div>
      <div class="page"><img src="pascoa-da-lua/02_L.jpg" alt=""></div>
      <div class="page"><img src="pascoa-da-lua/02_R.jpg" alt=""></div>
      <div class="page"><img src="pascoa-da-lua/03_L.jpg" alt=""></div>
      <div class="page"><img src="pascoa-da-lua/03_R.jpg" alt=""></div>
      <div class="page"><img src="pascoa-da-lua/04_L.jpg" alt=""></div>
      <div class="page"><img src="pascoa-da-lua/04_R.jpg" alt=""></div>
      <div class="page"><img src="pascoa-da-lua/05_L.jpg" alt=""></div>
      <div class="page"><img src="pascoa-da-lua/05_R.jpg" alt=""></div>
      <div class="page"><img src="pascoa-da-lua/06_L.jpg" alt=""></div>
      <div class="page"><img src="pascoa-da-lua/06_R.jpg" alt=""></div>
      <div class="page"><img src="pascoa-da-lua/07_L.jpg" alt=""></div>
      <div class="page"><img src="pascoa-da-lua/07_R.jpg" alt=""></div>
      <div class="page"><img src="pascoa-da-lua/08_L.jpg" alt=""></div>
      <div class="page"><img src="pascoa-da-lua/08_R.jpg" alt=""></div>
      <div class="page"><img src="pascoa-da-lua/09_L.jpg" alt=""></div>
      <div class="page"><img src="pascoa-da-lua/09_R.jpg" alt=""></div>
      <div class="page"><img src="pascoa-da-lua/10_L.jpg" alt=""></div>
      <div class="page"><img src="pascoa-da-lua/10_R.jpg" alt=""></div>
      <div class="page"><img src="pascoa-da-lua/11_L.jpg" alt=""></div>
      <div class="page"><img src="pascoa-da-lua/11_R.jpg" alt=""></div>
    </div>
  </div>
</div>

<button class="nav-btn off" id="btnPrev">&#8249;</button>
<button class="nav-btn" id="btnNext">&#8250;</button>

<div id="hint">👆 clique nas laterais para virar a página</div>
<div id="controls">
  <span id="counter">1 / 12</span>
  <div id="dots"></div>
</div>
<div id="logo">
  <span id="logo-moon">🌙</span>
  <span id="logo-text">Biblioteca<br>da Lua</span>
</div>

<script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.js"></script>
<script>
const TOTAL_SPREADS = 12;

let pageFlip  = null;
let curSpread = 0;
let hintOn    = true;

const container = document.getElementById('book-container');
const dotsEl    = document.getElementById('dots');
const counterEl = document.getElementById('counter');
const btnPrev   = document.getElementById('btnPrev');
const btnNext   = document.getElementById('btnNext');
const hintEl    = document.getElementById('hint');

// Dots
for (let i = 0; i < TOTAL_SPREADS; i++) {
  const d = document.createElement('div');
  d.className = 'dot' + (i===0?' on':'');
  d.onclick = () => { if(pageFlip) pageFlip.flip(i * 2); };
  dotsEl.appendChild(d);
}

function updateUI(pageIndex) {
  curSpread = Math.floor(pageIndex / 2);
  counterEl.textContent = `${curSpread + 1} / ${TOTAL_SPREADS}`;
  dotsEl.querySelectorAll('.dot').forEach((d,i) => d.classList.toggle('on', i === curSpread));
  btnPrev.classList.toggle('off', curSpread === 0);
  btnNext.classList.toggle('off', curSpread === TOTAL_SPREADS - 1);
}

function calcSize() {
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  const mob = vw <= 768;
  let spreadW, spreadH;
  if (mob) {
    spreadW = vw;
    spreadH = Math.round(vw * 9/16);
  } else {
    const mxW = vw * 0.86, mxH = vh * 0.84;
    spreadW = Math.min(mxW, mxH * 16/9);
    spreadH = Math.round(spreadW * 9/16);
    if (spreadH > mxH) { spreadH = mxH; spreadW = Math.round(spreadH * 16/9); }
  }
  const pageW = Math.floor(spreadW / 2);
  const pageH = Math.floor(spreadH);
  return { pageW, pageH };
}

function initFlipBook() {
  const { pageW, pageH } = calcSize();
  const mob = window.innerWidth <= 768;

  if (pageFlip) { pageFlip.destroy(); pageFlip = null; }

  // Ajusta tamanho de cada .page
  document.querySelectorAll('.page').forEach(p => {
    p.style.width  = pageW + 'px';
    p.style.height = pageH + 'px';
  });

  pageFlip = new St.PageFlip(container, {
    width:    pageW,
    height:   pageH,
    size:     'fixed',
    drawShadow:          true,
    flippingTime:        750,
    usePortrait:         false,
    startZIndex:         0,
    autoSize:            false,
    maxShadowOpacity:    0.6,
    showCover:           false,
    mobileScrollSupport: false,
    clickEventForward:   false,
    useMouseEvents:      true,
    swipeDistance:       30,
    showPageCorners:     true,
    disableFlipByClick:  false,
  });

  // ★ Carrega de HTML em vez de imagens — resolve o problema de canvas/CORS
  pageFlip.loadFromHTML(document.querySelectorAll('.page'));

  pageFlip.on('flip', (e) => {
    updateUI(e.data);
    hideHint();
  });

  pageFlip.on('init', () => {
    updateUI(0);
    setTimeout(() => document.getElementById('loader').classList.add('out'), 400);
  });

  if (mob) {
    container.style.position  = 'absolute';
    container.style.top       = '50%';
    container.style.left      = '50%';
    container.style.transform = 'translate(-50%, -50%)';
  } else {
    container.style.cssText = '';
  }
}

btnPrev.onclick = () => { if(pageFlip) { pageFlip.flipPrev(); hideHint(); } };
btnNext.onclick = () => { if(pageFlip) { pageFlip.flipNext(); hideHint(); } };

document.addEventListener('keydown', e => {
  if (!pageFlip) return;
  if (e.key==='ArrowRight'||e.key==='ArrowDown') { pageFlip.flipNext(); hideHint(); }
  if (e.key==='ArrowLeft' ||e.key==='ArrowUp')   { pageFlip.flipPrev(); hideHint(); }
});

function hideHint() {
  if (hintOn) { hintEl.classList.add('out'); hintOn=false; }
}
setTimeout(hideHint, 5000);

let rsTimer;
window.addEventListener('resize', () => {
  clearTimeout(rsTimer);
  rsTimer = setTimeout(() => {
    const s = curSpread;
    initFlipBook();
    setTimeout(() => { if(pageFlip && s > 0) pageFlip.flip(s * 2); }, 150);
  }, 300);
});

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}

initFlipBook();
</script>
</body>
</html>
