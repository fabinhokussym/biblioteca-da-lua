<!DOCTYPE html>
<!-- v9 -->
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Biblioteca da Lua">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#fdf6ee">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>A Páscoa da Lua — Biblioteca da Lua</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: #f5ece0;
  font-family: Georgia, serif;
  user-select: none;
  -webkit-user-select: none;
  touch-action: none;
}

/* Stage ocupa tudo */
#stage {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* O container do StPageFlip — tamanho definido via JS */
#flip-book {
  display: block;
}

/* Páginas — tamanho definido via JS */
.page {
  overflow: hidden;
  background: #f0e8d8;
}
.page img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  pointer-events: none;
}

/* Controles inferiores */
#controls {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  z-index: 50;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 16px;
  padding: 8px 20px 12px;
  background: rgba(245,236,224,0.85);
  backdrop-filter: blur(4px);
}

#dots { display: flex; gap: 6px; align-items: center; }
.dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: rgba(150,90,30,0.22);
  border: 1px solid rgba(150,90,30,0.14);
  cursor: pointer;
  transition: all 0.2s;
}
.dot.on { background: #d4884a; transform: scale(1.45); border-color: #d4884a; }

#counter {
  font-size: 11px; color: #a07040;
  letter-spacing: 1.5px; opacity: 0.65;
  min-width: 44px; text-align: center;
}

/* Logo */
#logo {
  position: fixed;
  bottom: 14px; left: 14px;
  z-index: 60;
  display: flex; align-items: center; gap: 5px;
  opacity: 0.45; pointer-events: none;
}
#logo-moon { font-size: 14px; line-height: 1; }
#logo-text {
  font-size: 8px; letter-spacing: 1.4px;
  color: #a06830; text-transform: uppercase; line-height: 1.3;
}

/* Hint */
#hint {
  position: fixed;
  bottom: 50px; left: 50%; transform: translateX(-50%);
  background: rgba(255,255,255,0.92); color: #a06830;
  font-size: 11px; padding: 5px 14px; border-radius: 20px;
  border: 1px solid rgba(160,100,40,0.15);
  z-index: 60; pointer-events: none; white-space: nowrap;
  transition: opacity 1.5s;
}
#hint.out { opacity: 0; }

/* Loader */
#loader {
  position: fixed; inset: 0; z-index: 999;
  background: #fdf6ee;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 18px;
  transition: opacity 0.9s;
}
#loader.out { opacity: 0; pointer-events: none; }
.moon-anim { font-size: 52px; animation: float 2s ease-in-out infinite; }
@keyframes float {
  0%, 100% { transform: translateY(0) rotate(-8deg); }
  50%       { transform: translateY(-12px) rotate(8deg); }
}
#loader-title { font-size: 18px; color: #c07838; letter-spacing: 2.5px; font-style: italic; opacity: 0.85; }
#loader-sub   { font-size: 11px; color: #c09060; letter-spacing: 2px; opacity: 0.5; }

/* Mobile escuro */
@media (max-width: 768px) {
  html, body { background: #111; }
  #controls { background: rgba(0,0,0,0.6); }
  .dot { background: rgba(255,255,255,0.2); border-color: rgba(255,255,255,0.1); }
  .dot.on { background: #f4a835; border-color: #f4a835; }
  #counter { color: rgba(255,255,255,0.5); }
  #logo-text { color: rgba(255,255,255,0.4); }
  #hint { background: rgba(0,0,0,0.6); color: rgba(255,255,255,0.7); border-color: rgba(255,255,255,0.1); }
  #loader { background: #0d0700; }
  #loader-title { color: #e89040; }
}
</style>
</head>
<body>

<div id="loader">
  <div class="moon-anim">🌙</div>
  <p id="loader-title">Biblioteca da Lua</p>
  <p id="loader-sub">Abrindo o livro...</p>
</div>

<div id="stage">
  <div id="flip-book">
    <div class="page"><img src="pascoa-da-lua/00_L.jpg" alt=""></div>
    <div class="page"><img src="pascoa-da-lua/00_R.jpg" alt=""></div>
    <div class="page"><img src="pascoa-da-lua/01_L.jpg" alt=""></div>
    <div class="page"><img src="pascoa-da-lua/01_R.jpg" alt=""></div>
    <div class="page"><img src="pascoa-da-lua/02_L.jpg" alt=""></div>
    <div class="page"><img src="pascoa-da-lua/02_R.jpg" alt=""></div>
    <div class="page"><img src="pascoa-da-lua/03_L.jpg" alt=""></div>
    <div class="page"><img src="pascoa-da-lua/03_R.jpg" alt=""></div>
    <div class="page"><img src="pascoa-da-lua/04_L.jpg" alt=""></div>
    <div class="page"><img src="pascoa-da-lua/04_R.jpg" alt=""></div>
    <div class="page"><img src="pascoa-da-lua/05_L.jpg" alt=""></div>
    <div class="page"><img src="pascoa-da-lua/05_R.jpg" alt=""></div>
    <div class="page"><img src="pascoa-da-lua/06_L.jpg" alt=""></div>
    <div class="page"><img src="pascoa-da-lua/06_R.jpg" alt=""></div>
    <div class="page"><img src="pascoa-da-lua/07_L.jpg" alt=""></div>
    <div class="page"><img src="pascoa-da-lua/07_R.jpg" alt=""></div>
    <div class="page"><img src="pascoa-da-lua/08_L.jpg" alt=""></div>
    <div class="page"><img src="pascoa-da-lua/08_R.jpg" alt=""></div>
    <div class="page"><img src="pascoa-da-lua/09_L.jpg" alt=""></div>
    <div class="page"><img src="pascoa-da-lua/09_R.jpg" alt=""></div>
    <div class="page"><img src="pascoa-da-lua/10_L.jpg" alt=""></div>
    <div class="page"><img src="pascoa-da-lua/10_R.jpg" alt=""></div>
    <div class="page"><img src="pascoa-da-lua/11_L.jpg" alt=""></div>
    <div class="page"><img src="pascoa-da-lua/11_R.jpg" alt=""></div>
  </div>
</div>

<div id="hint">👆 clique nas laterais ou deslize para virar</div>

<div id="controls">
  <span id="counter">1 / 12</span>
  <div id="dots"></div>
</div>

<div id="logo">
  <span id="logo-moon">🌙</span>
  <span id="logo-text">Biblioteca<br>da Lua</span>
</div>

<script src="https://cdn.jsdelivr.net/npm/page-flip@2.0.7/dist/js/page-flip.browser.js"></script>
<script>
const TOTAL = 12;
let pf        = null;
let curSpread = 0;
let hintOn    = true;

const bookEl    = document.getElementById('flip-book');
const dotsEl    = document.getElementById('dots');
const counterEl = document.getElementById('counter');
const hintEl    = document.getElementById('hint');

// Dots
for (let i = 0; i < TOTAL; i++) {
  const d = document.createElement('div');
  d.className = 'dot' + (i === 0 ? ' on' : '');
  d.onclick = () => { if (pf) pf.flip(i * 2); };
  dotsEl.appendChild(d);
}

function updateUI(pageIndex) {
  curSpread = Math.floor(pageIndex / 2);
  counterEl.textContent = `${curSpread + 1} / ${TOTAL}`;
  dotsEl.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('on', i === curSpread));
}

// ── Calcula pageW e pageH ──
// O spread completo (L+R) = 16:9
// Cada page = metade do spread = 8:9
function getSize() {
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  const controlsH = 42; // barra inferior

  // Disponível
  const availW = vw;
  const availH = vh - controlsH;

  // Spread 16:9
  let sw = availW;
  let sh = Math.round(sw * 9 / 16);
  if (sh > availH) {
    sh = availH;
    sw = Math.round(sh * 16 / 9);
  }

  // Garante valores pares para dividir ao meio exatamente
  sw = Math.floor(sw / 2) * 2;
  sh = Math.floor(sh);

  return {
    pageW: sw / 2,
    pageH: sh
  };
}

// ── Inicia ou reinicia o StPageFlip ──
function init() {
  const { pageW, pageH } = getSize();

  // Para e limpa instância anterior
  if (pf) {
    try { pf.destroy(); } catch (e) {}
    pf = null;
  }

  // ★ Define tamanho explícito em cada .page ANTES da biblioteca
  document.querySelectorAll('.page').forEach(p => {
    p.style.width  = pageW + 'px';
    p.style.height = pageH + 'px';
  });

  // ★ Define tamanho explícito no container ANTES da biblioteca
  bookEl.style.width  = (pageW * 2) + 'px';
  bookEl.style.height = pageH + 'px';

  // Cria nova instância
  pf = new St.PageFlip(bookEl, {
    width:    pageW,
    height:   pageH,
    size:     'fixed',
    minWidth:  pageW,
    maxWidth:  pageW,
    minHeight: pageH,
    maxHeight: pageH,
    autoSize:            false,
    usePortrait:         false,
    drawShadow:          true,
    flippingTime:        700,
    maxShadowOpacity:    0.5,
    showCover:           false,
    mobileScrollSupport: false,
    useMouseEvents:      true,
    swipeDistance:       30,
    showPageCorners:     true,
    disableFlipByClick:  false,
    clickEventForward:   false,
    startZIndex:         0,
  });

  pf.loadFromHTML(document.querySelectorAll('.page'));

  pf.on('flip', e => {
    updateUI(e.data);
    hideHint();
  });

  pf.on('init', () => {
    updateUI(curSpread * 2);
    document.getElementById('loader').classList.add('out');
  });
}

function hideHint() {
  if (hintOn) { hintEl.classList.add('out'); hintOn = false; }
}
setTimeout(hideHint, 5000);

// ── Resize e orientação ──
let rsTimer = null;

function scheduleInit() {
  clearTimeout(rsTimer);
  // Guarda spread atual antes de reiniciar
  rsTimer = setTimeout(() => {
    const prev = curSpread;
    init();
    // Restaura página após reiniciar
    if (prev > 0) {
      setTimeout(() => { if (pf) pf.flip(prev * 2); }, 300);
    }
  }, 350);
}

window.addEventListener('resize', scheduleInit);
window.addEventListener('orientationchange', () => {
  clearTimeout(rsTimer);
  // Espera mais tempo no iOS para rotação completar
  rsTimer = setTimeout(() => {
    const prev = curSpread;
    init();
    if (prev > 0) {
      setTimeout(() => { if (pf) pf.flip(prev * 2); }, 300);
    }
  }, 600);
});

// visualViewport é o mais confiável em iOS Safari
if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', scheduleInit);
}

// Teclado
document.addEventListener('keydown', e => {
  if (!pf) return;
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { pf.flipNext(); hideHint(); }
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   { pf.flipPrev(); hideHint(); }
});

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}

// ── Inicia ──
init();
</script>
</body>
</html>
